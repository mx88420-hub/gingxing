<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早睡早起身體好 - 雲端多用戶照片版</title>
    <style>
        :root {
            --bg-color: #F6F8FA; 
            --card-bg: #FFFFFF;
            --primary-pink: #FFB7B2; 
            --primary-blue: #B5E2FA; 
            --primary-green: #DDF1E7; 
            --primary-purple: #E1BEE7; 
            --primary-yellow: #FFDAC1; 
            --text-color: #5D5D5D;
            --danger-color: #FF9AA2;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 🔒 登入/註冊 遮罩畫面 */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(246, 248, 250, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 4px solid var(--primary-purple);
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-sizing: border-box;
        }

        .login-box h3 {
            margin-top: 0;
            color: #6C7A89;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-input:focus { outline: none; border-color: var(--primary-purple); }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-login-submit { background-color: var(--primary-purple); box-shadow: 0 5px 15px rgba(225, 190, 231, 0.5); }
        .btn-register-submit { background-color: var(--primary-blue); color: #5D5D5D; }

        .switch-mode-text {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
        }

        #login-error {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }

        /* 主畫面布局 */
        .main-layout {
            display: flex;
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            flex-wrap: wrap;
            display: none; 
        }

        .left-panel {
            flex: 1;
            min-width: 320px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            padding: 25px;
            box-sizing: border-box;
            border: 4px solid var(--primary-pink);
            text-align: center;
        }

        .right-panel {
            flex: 1.4;
            min-width: 360px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            padding: 25px;
            box-sizing: border-box;
            border: 4px solid var(--primary-blue);
        }

        .tag-title {
            background-color: var(--primary-purple);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .clock {
            font-size: 38px;
            font-weight: bold;
            color: #4A4A4A;
            margin: 10px 0;
            background: var(--primary-green);
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
        }

        .slogan-box {
            background-color: #FFF4E5;
            border-left: 5px solid var(--primary-yellow);
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            color: #8A6D3B;
            text-align: left;
            line-height: 1.4;
        }

        /* 👑 管理員專用選單 */
        #admin-user-selector-box {
            background: #F0F4F8;
            border: 2px dashed #B0C4DE;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }
        #admin-user-selector-box label { font-size: 12px; font-weight: bold; color: #4682B4; }
        select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 8px; border: 1px solid #CCC; }

        .btn {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-punch { background-color: var(--primary-pink); width: 100%; padding: 15px; font-size: 18px; box-shadow: 0 5px 15px rgba(255, 183, 178, 0.4); margin-bottom: 10px; }
        .btn-sync { background-color: var(--primary-blue); color: #5D5D5D; font-size: 13px; padding: 5px 15px; border-radius: 10px; margin-bottom: 15px; display: inline-block; }
        .btn:hover { transform: translateY(-2px); }

        .result-box { margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 18px; font-weight: bold; display: none; }
        .good-baby { background-color: #E8F5E9; color: #2E7D32; border: 2px dashed #A5D6A7; }
        .bad-baby { background-color: #FFEBEE; color: #C62828; border: 2px dashed #EF9A9A; }

        /* 行事曆 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-btn { background: var(--primary-blue); border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #5D5D5D; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .weekday { font-weight: bold; color: #A0A0A0; font-size: 13px; padding: 5px 0; }
        .day { background-color: #F9F9F9; aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 4px; font-size: 13px; cursor: pointer; border: 2px solid transparent; }
        .day:hover { background-color: #E3F2FD; }
        .day.current-selected { border: 2px solid var(--primary-purple); background-color: #F3E5F5; }
        .day.today { background-color: var(--primary-blue); font-weight: bold; }
        .day-status { font-size: 11px; margin-top: auto; }

        /* 📸 照片與日記編輯區 */
        .editor-section { margin-top: 20px; background: #FDFDFD; border: 2px dashed #E0E0E0; border-radius: 15px; padding: 15px; }
        .editor-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #7A869A; }
        
        .food-photo-container {
            width: 100%;
            max-height: 220px;
            background-color: #F0F0F0;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            border: 2px dashed #CCC;
            position: relative;
        }
        .food-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-placeholder-text {
            color: #999;
            font-size: 13px;
            text-align: center;
            padding: 20px;
        }
        .upload-hidden-input { display: none; }
        .btn-upload-trigger {
            background-color: #FFF;
            color: #6C7A89;
            border: 2px solid #CCC;
            padding: 6px 15px;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 12px;
            display: inline-block;
            font-weight: bold;
        }
        .btn-upload-trigger:hover { background-color: #F5F5F5; }

        textarea { width: 100%; height: 70px; border: 1px solid #DDD; border-radius: 10px; padding: 10px; box-sizing: border-box; resize: none; font-family: inherit; margin-bottom: 10px; }
        .save-btn { background-color: var(--primary-purple); padding: 8px 20px; font-size: 14px; float: right; }
        .clear { clear: both; }
        .loading-text { font-size: 12px; color: #aaa; margin-top: 5px; }
        
        .user-panel-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; }
        .user-badge { color: #888; font-weight: bold; }
        .btn-logout { background-color: #FFF; color: #FF9AA2; border: 1.5px solid #FF9AA2; padding: 4px 10px; font-size: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-logout:hover { background-color: #FF9AA2; color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="tag-title" style="font-size: 14px; margin-bottom: 10px;" id="form-tag">🔐 安全登入系統</div>
        <h3 id="form-title">歡迎來到早睡早起身體好</h3>
        
        <div class="input-group">
            <label>使用者帳號 (僅支援英數字)</label>
            <input type="text" id="username" class="login-input" placeholder="請輸入帳號">
        </div>
        <div class="input-group">
            <label>登入密碼</label>
            <input type="password" id="password" class="login-input" placeholder="請輸入密碼">
        </div>
        
        <div id="login-error"></div>

        <div class="btn-group">
            <button id="btn-main-submit" class="btn-action btn-login-submit" onclick="handleFormSubmit()">登入</button>
        </div>
        <div class="switch-mode-text" id="switch-mode-btn" onclick="toggleAuthMode()">還沒有帳號？點此免費註冊</div>
    </div>
</div>

<div class="main-layout" id="main-system">
    
    <div class="left-panel">
        <div class="user-panel-top">
            <div class="user-badge" id="user-display">目前登入：--</div>
            <button class="btn-logout" onclick="performLogout()">🔒 安全登出</button>
        </div>
        
        <div id="admin-user-selector-box">
            <label>👑 管理員專用：請選擇要查看的用戶資料</label>
            <select id="admin-select-user" onchange="adminSwitchUserView()"></select>
        </div>

        <div class="tag-title">早睡早起身體好</div>
        <div>
            <button class="btn btn-sync" onclick="pullDataFromCloud()">🔄 點擊刷新同步雲端</button>
            <div id="sync-status" class="loading-text">正在同步雲端...</div>
        </div>
        <div id="live-date" style="font-size: 16px; color: #888;">2026年--月--日</div>
        <div class="clock" id="clock-display">00:00:00</div>
        
        <div class="slogan-box" id="slogan-display">加油！每天都是全新、更棒的自己！</div>
        
        <button id="punch-btn-element" class="btn btn-punch" onclick="performPunchIn()">✨ 當日健康打卡 ✨</button>
        <div class="result-box" id="result-display"></div>
    </div>
    
    <div class="right-panel">
        <div class="calendar-header">
            <button class="calendar-btn" onclick="changeMonth(-1)">◀</button>
            <h2 id="calendar-month-year" style="margin:0; font-size:20px;">2026年 --月</h2>
            <button class="calendar-btn" onclick="changeMonth(1)">▶</button>
        </div>
        
        <div class="calendar-grid" id="calendar-grid"></div>

        <div class="editor-section">
            <div class="editor-title" id="editor-date-title">選擇日期來記錄生活吧！</div>
            <div id="day-punch-history" style="font-size: 13px; color: #666; margin-bottom: 8px; font-weight: bold;"></div>
            
            <div class="food-photo-container" id="photo-preview-box">
                <div class="photo-placeholder-text" id="photo-placeholder-text">📸 今天吃了什麼好料？點下方按鈕上傳照片分享吧！</div>
                <img id="food-img-element" style="display:none;" src="" alt="今日美食">
            </div>
            
            <input type="file" id="photo-file-input" class="upload-hidden-input" accept="image/*" onchange="processAndPreviewImage(this)">
            <button id="upload-btn-trigger-el" class="btn-upload-trigger" onclick="document.getElementById('photo-file-input').click()">📷 上傳/更換今天吃什麼的照片</button>

            <textarea id="note-input" placeholder="今天有什麼想分享的心情..."></textarea>
            <button id="save-note-btn-el" class="btn save-btn" onclick="saveDailyNote()">儲存今日美食與心情</button>
            <div class="clear"></div>
        </div>
    </div>
</div>

<script>
    const GLOBAL_REG_BIN = '6a3b7243f5f4af5e29272dc4'; 
    const MASTER_KEY = '$2a$10$hI.UbvJsfQa.7SxfrbZQE./.4pB/55flm6kq88Vuwgt/3IzyMB5ii'; 
    const ORIGINAL_BIN = '65ab19e51f5677613ba2a488'; 

    // 🔒 內建固定免註冊兩組帳號設定
    const HARDCODED_USERS = {
        'ginggingxing': { pass: '0979365961', isAdmin: true, binId: ORIGINAL_BIN },
        'popoman': { pass: '0926682683', isAdmin: false, binId: ORIGINAL_BIN }
    };

    let isRegisterMode = false;
    let currentUser = "";
    let targetUserBinId = ""; 
    let currentViewingUser = ""; 
    let globalUsersDatabase = {}; 
    let appData = {}; 
    let currentDate = new Date(); 
    let selectedDateStr = ""; 
    let syncIntervalId = null;
    let base64ImageStr = ""; 

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        const tag = document.getElementById('form-tag');
        const title = document.getElementById('form-title');
        const btn = document.getElementById('btn-main-submit');
        const switchBtn = document.getElementById('switch-mode-btn');
        document.getElementById('login-error').style.display = 'none';

        if(isRegisterMode) {
            tag.innerText = "📝 新增用戶註冊";
            title.innerText = "建立全新專屬個人日記箱";
            btn.innerText = "確認註冊新帳號";
            btn.className = "btn-action btn-register-submit";
            switchBtn.innerText = "已有帳號？返回登入畫面";
        } else {
            tag.innerText = "🔐 安全登入系統";
            title.innerText = "歡迎來到早睡早起身體好";
            btn.innerText = "登入";
            btn.className = "btn-action btn-login-submit";
            switchBtn.innerText = "還沒有帳號？點此免費註冊";
        }
    }

    function handleFormSubmit() {
        const userIn = document.getElementById('username').value.trim().toLowerCase();
        const passIn = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('login-error');
        errorMsg.style.display = 'none';

        if(!userIn || !passIn) {
            showError("❌ 請填寫帳號及密碼！");
            return;
        }

        // ✨ 徹底隔離！如果是固定帳號，完全不碰外部 API，100%直接進系統
        if(!isRegisterMode && HARDCODED_USERS[userIn]) {
            if(HARDCODED_USERS[userIn].pass === passIn) {
                currentUser = userIn;
                currentViewingUser = userIn;
                targetUserBinId = HARDCODED_USERS[userIn].binId;
                
                // 1. 先把主畫面的框架開起來，遮罩關掉
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-system').style.display = 'flex';
                
                if(HARDCODED_USERS[userIn].isAdmin) {
                    document.getElementById('user-display').innerText = `👑 管理員：${currentUser}`;
                    setupAdminConsole(); 
                } else {
                    document.getElementById('user-display').innerText = `👤 使用者：${currentUser}`;
                    document.getElementById('admin-user-selector-box').style.display = 'none';
                }
                
                document.getElementById('username').value = "";
                document.getElementById('password').value = "";

                // 2. 緩衝 100 毫秒，等 DOM 完全顯示排版完畢後，再發動系統初始化讀取資料，防止卡住
                setTimeout(() => {
                    initSystem();
                    
                    // 3. 在完全進入系統後，才在最底層背景抓取線上多用戶名單
                    fetch(`https://api.jsonbin.io/v3/b/${GLOBAL_REG_BIN}/latest`, {
                        method: 'GET', headers: { 'X-Master-Key': MASTER_KEY }
                    }).then(r => r.json()).then(d => { 
                        globalUsersDatabase = d.record || {};
                        if(globalUsersDatabase.status === "ok") globalUsersDatabase = {};
                        if(HARDCODED_USERS[currentUser] && HARDCODED_USERS[currentUser].isAdmin) setupAdminConsole();
                    }).catch(e => console.log("背景註冊名單異步加載略有延遲"));
                }, 100);

                return;
            } else {
                showError("❌ 密碼不正確！");
                return;
            }
        }

        if(!/^[a-z0-9]+$/.test(userIn)) {
            showError("❌ 帳號僅能使用英文小寫與數字喔！");
            return;
        }

        document.getElementById('sync-status').innerText = "📡 安全驗證中，請稍候...";
        
        // 2. 多用戶新註冊者登入對接流程
        fetch(`https://api.jsonbin.io/v3/b/${GLOBAL_REG_BIN}/latest`, {
            method: 'GET', headers: { 'X-Master-Key': MASTER_KEY }
        })
        .then(res => res.json())
        .then(data => {
            globalUsersDatabase = data.record || {};
            if(globalUsersDatabase.status === "ok") globalUsersDatabase = {};

            if(isRegisterMode) {
                if(globalUsersDatabase[userIn] || HARDCODED_USERS[userIn]) {
                    showError("❌ 該帳號已被佔用，請換一個名字！");
                    return;
                }
                
                fetch(`https://api.jsonbin.io/v3/b`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY, 'X-Bin-Private': 'true' },
                    body: JSON.stringify({ greeting: "Welcome to your private diary!" })
                })
                .then(res => res.json())
                .then(newBinData => {
                    const allocatedBinId = newBinData.metadata.id;
                    globalUsersDatabase[userIn] = { password: passIn, binId: allocatedBinId };
                    
                    return fetch(`https://api.jsonbin.io/v3/b/${GLOBAL_REG_BIN}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                        body: JSON.stringify(globalUsersDatabase)
                    });
                })
                .then(() => {
                    alert("🎉 註冊成功！請直接登入！");
                    toggleAuthMode();
                })
                .catch(err => { console.error(err); showError("❌ 註冊伺服器通訊失敗。"); });

            } else {
                if(globalUsersDatabase[userIn] && globalUsersDatabase[userIn].password === passIn) {
                    currentUser = userIn;
                    currentViewingUser = userIn;
                    targetUserBinId = globalUsersDatabase[userIn].binId;

                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-system').style.display = 'flex';
                    document.getElementById('user-display').innerText = `👤 使用者：${currentUser}`;
                    document.getElementById('admin-user-selector-box').style.display = 'none';
                    document.getElementById('username').value = "";
                    document.getElementById('password').value = "";

                    setTimeout(() => {
                        initSystem();
                    }, 100);
                } else {
                    showError("❌ 帳號或密碼不正確！");
                }
            }
        })
        .catch(err => { 
            console.error(err); showError("❌ 連線異常，請確認網路！"); 
        });
    }

    function setupAdminConsole() {
        const box = document.getElementById('admin-user-selector-box');
        const selector = document.getElementById('admin-select-user');
        if(!selector || !box) return;
        
        selector.innerHTML = "";
        box.style.display = 'block';

        // 內建固定帳號選項
        Object.keys(HARDCODED_USERS).forEach(user => {
            const opt = document.createElement('option');
            opt.value = user;
            opt.innerText = (user === currentUser) ? `自己 (${user})` : `固定用戶：${user}`;
            if(user === currentUser) opt.selected = true;
            selector.appendChild(opt);
        });

        // 註冊之新用戶選項
        Object.keys(globalUsersDatabase).forEach(user => {
            if(!HARDCODED_USERS[user]) {
                const opt = document.createElement('option');
                opt.value = user;
                opt.innerText = `註冊用戶：${user}`;
                selector.appendChild(opt);
            }
        });
    }

    function adminSwitchUserView() {
        const selectedUser = document.getElementById('admin-select-user').value;
        currentViewingUser = selectedUser;
        
        if(HARDCODED_USERS[selectedUser]) {
            targetUserBinId = HARDCODED_USERS[selectedUser].binId;
        } else {
            targetUserBinId = globalUsersDatabase[selectedUser].binId;
        }
        
        if(currentViewingUser !== currentUser) {
            document.getElementById('punch-btn-element').style.display = 'none';
            document.getElementById('upload-btn-trigger-el').style.display = 'none';
            document.getElementById('save-note-btn-el').style.display = 'none';
            document.getElementById('note-input').readOnly = true;
        } else {
            document.getElementById('punch-btn-element').style.display = 'block';
            document.getElementById('upload-btn-trigger-el').style.display = 'inline-block';
            document.getElementById('save-note-btn-el').style.display = 'block';
            document.getElementById('note-input').readOnly = false;
        }

        pullDataFromCloud();
    }

    function showError(msg) {
        const errorMsg = document.getElementById('login-error');
        if(errorMsg) {
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
        }
        const syncStatus = document.getElementById('sync-status');
        if(syncStatus) syncStatus.innerText = "";
    }

    function performLogout() {
        currentUser = ""; currentViewingUser = ""; targetUserBinId = "";
        if (syncIntervalId) clearInterval(syncIntervalId);
        document.getElementById('main-system').style.display = 'none';
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('username').value = "";
        document.getElementById('password').value = "";
        document.getElementById('result-display').style.display = 'none';
    }

    function initSystem() {
        if(window.clockIntervalId) clearInterval(window.clockIntervalId);
        updateClock();
        window.clockIntervalId = setInterval(updateClock, 1000);
        selectedDateStr = formatDateKey(new Date());
        
        pullDataFromCloud();
        if (syncIntervalId) clearInterval(syncIntervalId);
        syncIntervalId = setInterval(pullDataFromCloud, 30000);
    }

    const slogans = [

        "🥤 什麼品種的豬最黑？…… 烏龍麵（烏龍meee）。",

    ];

    function formatDateKey(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function updateClock() {
        const now = new Date();
        const options = { timeZone: 'Asia/Taipei', year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        const liveDateEl = document.getElementById('live-date');
        if(liveDateEl) liveDateEl.innerText = new Intl.DateTimeFormat('zh-TW', options).format(now);
        
        const timeOptions = { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const clockDisplayEl = document.getElementById('clock-display');
        if(clockDisplayEl) clockDisplayEl.innerText = new Intl.DateTimeFormat('zh-TW', timeOptions).format(now);
    }

    function setRandomSlogan() {
        const randomIndex = Math.floor(Math.random() * slogans.length);
        const sloganEl = document.getElementById('slogan-display');
        if(sloganEl) sloganEl.innerText = slogans[randomIndex];
    }

    function processAndPreviewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const max_size = 400; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    base64ImageStr = canvas.toDataURL('image/jpeg', 0.7); 
                    
                    document.getElementById('photo-placeholder-text').style.display = 'none';
                    const imgEl = document.getElementById('food-img-element');
                    imgEl.src = base64ImageStr;
                    imgEl.style.display = 'block';
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function pullDataFromCloud() {
        if (!targetUserBinId) return;
        const syncStatusEl = document.getElementById('sync-status');
        if(syncStatusEl) syncStatusEl.innerText = `⏳ 讀取 [${currentViewingUser}] 的獨立雲端盒...`;
        
        fetch(`https://api.jsonbin.io/v3/b/${targetUserBinId}/latest`, {
            method: 'GET', headers: { 'X-Master-Key': MASTER_KEY }
        })
        .then(res => res.json())
        .then(data => {
            appData = data.record || {};
            renderCalendar();
            selectDay(selectedDateStr);
            if(syncStatusEl) syncStatusEl.innerText = `✅ 已即時同步 [${currentViewingUser}] 的紀錄`;
        })
        .catch(err => {
            console.error(err);
            if(syncStatusEl) syncStatusEl.innerText = "❌ 雲端讀取異常";
        });
    }

    function pushDataToCloud() {
        if (!targetUserBinId) return;
        fetch(`https://api.jsonbin.io/v3/b/${targetUserBinId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
            body: JSON.stringify(appData)
        })
        .then(() => {
            const syncStatusEl = document.getElementById('sync-status');
            if(syncStatusEl) syncStatusEl.innerText = "✅ 變更已安全儲存至個人雲端盒子";
        })
        .catch(err => console.error(err));
    }

    function performPunchIn() {
        const now = new Date();
        const todayStr = formatDateKey(now);
        const formatter = new Intl.DateTimeFormat('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false });
        const [{ value: hour },,{ value: minute }] = formatter.formatToParts(now);
        const currentHour = parseInt(hour, 10);

        let statusSymbol = ""; let statusText = ""; let statusClass = "";
        if (currentHour >= 2 && currentHour < 12) {
            statusSymbol = "👹 壞寶寶"; statusClass = "bad-baby";
            statusText = `你在 ${hour}:${minute} 打卡。稍微晚睡或晚起囉，加油調整作息！`;
        } else {
            statusSymbol = "🌟 乖寶寶"; statusClass = "good-baby";
            statusText = `你在 ${hour}:${minute} 打卡！時間維持得很棒，繼續保持！`;
        }

        const resultBox = document.getElementById('result-display');
        if(resultBox) {
            resultBox.className = `result-box ${statusClass}`;
            resultBox.innerHTML = `<div>${statusSymbol}</div><div style="font-size:13px; font-weight:normal; margin-top:4px;">${statusText}</div>`;
            resultBox.style.display = 'block';
        }

        if (!appData[todayStr]) appData[todayStr] = {};
        appData[todayStr].punch = `${statusSymbol} (${hour}:${minute})`;
        
        pushDataToCloud();
        renderCalendar();
        if (selectedDateStr === todayStr) selectDay(todayStr);
        setRandomSlogan(); 
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const monthYearTitle = document.getElementById('calendar-month-year');
        if(!grid || !monthYearTitle) return;
        grid.innerHTML = ''; 
        
        const year = currentDate.getFullYear(); const month = currentDate.getMonth();
        monthYearTitle.innerText = `${year}年 ${month + 1}月`;
        
        ['日', '一', '二', '三', '四', '五', '六'].forEach(w => {
            const div = document.createElement('div'); div.className = 'weekday'; div.innerText = w; grid.appendChild(div);
        });
        
        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();
        for (let i = 0; i < firstDayIndex; i++) grid.appendChild(document.createElement('div'));
        
        const todayStr = formatDateKey(new Date());
        for (let d = 1; d <= totalDays; d++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            const loopDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            if (loopDateStr === todayStr) dayDiv.classList.add('today');
            if (loopDateStr === selectedDateStr) dayDiv.classList.add('current-selected');
            
            dayDiv.innerHTML = `<div>${d}</div>`;
            
            if (appData[loopDateStr]) {
                let indicators = "";
                if (appData[loopDateStr].punch) indicators += appData[loopDateStr].punch.split(' ')[0];
                if (appData[loopDateStr].image) indicators += " 🍳"; 
                
                if(indicators !== "") {
                    const statusDiv = document.createElement('div');
                    statusDiv.className = 'day-status';
                    statusDiv.innerText = indicators;
                    dayDiv.appendChild(statusDiv);
                }
            }
            
            dayDiv.onclick = () => selectDay(loopDateStr);
            grid.appendChild(dayDiv);
        }
    }

    function changeMonth(direction) {
        currentDate.setMonth(currentDate.getMonth() + direction);
        renderCalendar();
    }

    function selectDay(dateStr) {
        selectedDateStr = dateStr;
        document.querySelectorAll('.day').forEach(node => node.classList.remove('current-selected'));
        const [y, m, d] = dateStr.split('-');
        const titleEl = document.getElementById('editor-date-title');
        if(titleEl) titleEl.innerText = `📅 觀看/編輯 ${parseInt(m, 10)}月${parseInt(d, 10)}日 的日常紀錄`;
        
        const historyZone = document.getElementById('day-punch-history');
        if(historyZone) {
            if (appData[dateStr] && appData[dateStr].punch) {
                historyZone.innerText = `當日打卡：${appData[dateStr].punch}`;
                historyZone.style.color = appData[dateStr].punch.includes("乖") ? "#2E7D32" : "#C62828";
            } else {
                historyZone.innerText = "當日無打卡紀錄"; historyZone.style.color = "#666";
            }
        }
        
        const imgEl = document.getElementById('food-img-element');
        const placeholderText = document.getElementById('photo-placeholder-text');
        
        if(imgEl && placeholderText) {
            if (appData[dateStr] && appData[dateStr].image) {
                base64ImageStr = appData[dateStr].image;
                imgEl.src = base64ImageStr;
                imgEl.style.display = 'block';
                placeholderText.style.display = 'none';
            } else {
                base64ImageStr = "";
                imgEl.src = "";
                imgEl.style.display = 'none';
                placeholderText.style.display = 'block';
            }
        }

        const noteIn = document.getElementById('note-input');
        if(noteIn) noteIn.value = (appData[dateStr] && appData[dateStr].note) ? appData[dateStr].note : "";
        const fileIn = document.getElementById('photo-file-input');
        if(fileIn) fileIn.value = ""; 
    }

    function saveDailyNote() {
        const text = document.getElementById('note-input').value.trim();
        if (!appData[selectedDateStr]) appData[selectedDateStr] = {};
        
        appData[selectedDateStr].note = text;
        appData[selectedDateStr].image = base64ImageStr; 
        
        pushDataToCloud();
        renderCalendar(); 
        alert("今日美食與心情日記儲存成功囉！🌸");
    }
</script>
