<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早睡早起身體好 - 純文字打卡雲端版</title>
    <style>
        :root {
            --bg-color: #F6F8FA; --card-bg: #FFFFFF;
            --primary-pink: #FFB7B2; --primary-blue: #B5E2FA; 
            --primary-green: #DDF1E7; --primary-purple: #E1BEE7; 
            --primary-yellow: #FFDAC1; --text-color: #5D5D5D;
            --danger-color: #FF9AA2;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(246, 248, 250, 0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: var(--card-bg); padding: 35px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 4px solid var(--primary-purple); text-align: center; max-width: 380px; width: 100%; box-sizing: border-box; }
        .login-box h3 { margin-top: 0; color: #6C7A89; font-size: 22px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 14px; color: #888; margin-bottom: 5px; font-weight: bold; }
        .login-input { width: 100%; padding: 12px; border: 2px solid #E0E0E0; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 12px; font-size: 15px; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .btn-login-submit { background-color: var(--primary-purple); }
        .btn-register-submit { background-color: var(--primary-blue); color: #5D5D5D; }
        .switch-mode-text { margin-top: 15px; font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; }
        #login-error { color: var(--danger-color); font-size: 14px; margin-top: 10px; font-weight: bold; display: none; }

        .main-layout { display: flex; gap: 25px; max-width: 1150px; width: 100%; flex-wrap: wrap; display: none; }
        .left-panel, .right-panel { background: var(--card-bg); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); padding: 25px; box-sizing: border-box; }
        .left-panel { flex: 1; min-width: 320px; border: 4px solid var(--primary-pink); text-align: center; }
        .right-panel { flex: 1.6; min-width: 420px; border: 4px solid var(--primary-blue); }

        .tag-title { background-color: var(--primary-purple); display: inline-block; padding: 6px 18px; border-radius: 20px; color: white; font-size: 18px; margin-bottom: 15px; }
        .clock { font-size: 38px; font-weight: bold; color: #4A4A4A; margin: 10px 0; background: var(--primary-green); padding: 10px; border-radius: 15px; display: inline-block; }
        
        #admin-user-selector-box { background: #F0F4F8; padding: 10px; border-radius: 12px; margin-bottom: 15px; display: none; text-align: left; }
        select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 8px; border: 1px solid #CCC; }

        .btn { color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .btn-punch { background-color: var(--primary-pink); width: 100%; padding: 15px; font-size: 18px; margin-bottom: 10px; }
        .btn-punch:disabled { background-color: #CCC !important; cursor: not-allowed; }
        .result-box { margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 18px; font-weight: bold; display: none; }
        .good-baby { background-color: #E8F5E9; color: #2E7D32; }
        .bad-baby { background-color: #FFEBEE; color: #C62828; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .day { background-color: #F9F9F9; aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 4px; font-size: 13px; cursor: pointer; border: 2px solid transparent; }
        .day.current-selected { border: 2px solid var(--primary-purple); background-color: #F3E5F5; }
        .day-status { font-size: 11px; margin-top: auto; font-weight: bold; }

        .editor-section { margin-top: 20px; background: #FDFDFD; border: 2px dashed #E0E0E0; border-radius: 15px; padding: 15px; }
        .editor-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #7A869A; }
        
        textarea { width: 100%; height: 90px; border: 1px solid #DDD; border-radius: 10px; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        .save-btn { background-color: var(--primary-purple); float: right; padding: 8px 20px; font-size: 14px; }
        .clear { clear: both; }
        .loading-text { font-size: 12px; color: #aaa; margin-top: 5px; }

        .user-panel-top { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; font-size: 13px; background: #FFF; padding: 10px; border-radius: 14px; border: 1px solid #E0E0E0; }
        .btn-logout { background-color: #FFF; color: #FF9AA2; border: 1px solid #FF9AA2; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h3 id="form-title">歡迎來到早睡早起身體好</h3>
        <div class="input-group"><label>帳號</label><input type="text" id="username" class="login-input"></div>
        <div class="input-group"><label>密碼</label><input type="password" id="password" class="login-input"></div>
        <div id="login-error"></div>
        <div class="btn-group"><button id="btn-main-submit" class="btn-action btn-login-submit" onclick="handleFormSubmit()">登入</button></div>
        <div class="switch-mode-text" id="switch-mode-btn" onclick="toggleAuthMode()">還沒有帳號？免費註冊</div>
    </div>
</div>

<div class="main-layout" id="main-system">
    <div class="left-panel">
        <div class="user-panel-top">
            <div id="user-display" style="font-weight: bold; color: var(--primary-purple);">目前登入：--</div>
            <button class="btn-logout" onclick="performLogout()">🔒 登出</button>
        </div>
        
        <div id="admin-user-selector-box">
            <label>👑 選擇要查看的用戶資料</label>
            <select id="admin-select-user" onchange="adminSwitchUserView()"></select>
        </div>

        <div class="tag-title">早睡早起身體好</div>
        <div class="clock" id="clock-display">00:00:00</div>
        
        <button id="punch-btn-element" class="btn btn-punch" disabled onclick="performPunchIn()">⏳ 正在載入雲端資料...</button>
        <div id="sync-status" class="loading-text">正在同步雲端...</div>
        <div class="result-box" id="result-display"></div>
    </div>
    
    <div class="right-panel">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)">◀</button>
            <h2 id="calendar-month-year" style="margin:0; font-size:20px;">2026年 --月</h2>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        
        <div class="calendar-grid" id="calendar-grid"></div>

        <div class="editor-section">
            <div class="editor-title" id="editor-date-title">選擇日期來記錄生活吧！</div>
            <div id="day-punch-history" style="font-size: 13px; color: #666; margin-bottom: 10px; font-weight: bold;"></div>
            
            <textarea id="note-input" placeholder="今天有什麼想分享的心情..." disabled></textarea>
            <button id="save-note-btn-el" class="btn save-btn" disabled onclick="saveDailyNote()">儲存今日心情</button>
            <div class="clear"></div>
        </div>
    </div>
</div>

<script>
    var GLOBAL_REG_BIN = '6a3b7243f5f4af5e29272dc4'; 
    var MASTER_KEY = '$2a$10$hI.UbvJsfQa.7SxfrbZQE./.4pB/55flm6kq88Vuwgt/3IzyMB5ii';
    var ORIGINAL_BIN = '65ab19e51f5677613ba2a488'; 

    var HARDCODED_USERS = { 'ginggingxing': { pass: '0979365961', isAdmin: true, binId: ORIGINAL_BIN } };
    var isRegisterMode = false, currentUser = "", targetUserBinId = "", currentViewingUser = ""; 
    var globalUsersDatabase = {}, appData = {}, currentDate = new Date(), selectedDateStr = ""; 
    var isDataLoaded = false; 

    // ✅ 修正：精準取得「當地時間」的 YYYY-MM-DD，避免時差造成紀錄存到前一天
    function getLocalYYYYMMDD(d) {
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    window.onload = function() {
        var savedUser = localStorage.getItem('health_user');
        var savedBinId = localStorage.getItem('health_binId');
        if (savedUser && savedBinId) {
            currentUser = savedUser; targetUserBinId = savedBinId; currentViewingUser = savedUser;
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            // ✅ 修正：解決「假性登出」視覺 Bug，將帳號顯示在畫面上
            document.getElementById('user-display').innerText = "目前登入：" + currentViewingUser;
            
            lockInterfaceForLoading();
            if(HARDCODED_USERS[currentUser] && HARDCODED_USERS[currentUser].isAdmin) {
                fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN + '/latest', { method: 'GET', headers: { 'X-Master-Key': MASTER_KEY } })
                .then(r => r.json()).then(d => { globalUsersDatabase = d.record || {}; setupAdminConsole(); adminSwitchUserView(); });
            } else { initSystem(); }
        }
    };

    function lockInterfaceForLoading() {
        isDataLoaded = false;
        document.getElementById('punch-btn-element').disabled = true;
        document.getElementById('save-note-btn-el').disabled = true;
        document.getElementById('note-input').disabled = true;
    }

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('form-title').innerText = isRegisterMode ? "建立新帳號" : "登入";
        document.getElementById('btn-main-submit').innerText = isRegisterMode ? "註冊" : "登入";
        document.getElementById('switch-mode-btn').innerText = isRegisterMode ? "已有帳號？返回登入" : "還沒有帳號？免費註冊";
    }

    function handleFormSubmit() {
        var userIn = document.getElementById('username').value.trim().toLowerCase();
        var passIn = document.getElementById('password').value.trim();
        if(!userIn || !passIn) return alert("請填寫帳號及密碼！");
        
        if(!isRegisterMode && HARDCODED_USERS[userIn] && HARDCODED_USERS[userIn].pass === passIn) {
            localStorage.setItem('health_user', userIn); localStorage.setItem('health_binId', HARDCODED_USERS[userIn].binId); window.location.reload(); return;
        }
        
        fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN + '/latest', { method: 'GET', headers: { 'X-Master-Key': MASTER_KEY } })
        .then(res => res.json()).then(data => {
            globalUsersDatabase = data.record || {};
            if(isRegisterMode) {
                if(globalUsersDatabase[userIn]) return alert("帳號被佔用！");
                fetch('https://api.jsonbin.io/v3/b', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY, 'X-Bin-Private': 'true' }, body: JSON.stringify({}) })
                .then(res => res.json()).then(newBin => {
                    globalUsersDatabase[userIn] = { password: passIn, binId: newBin.metadata.id };
                    return fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify(globalUsersDatabase) });
                }).then(() => { alert("註冊成功！"); toggleAuthMode(); });
            } else {
                if(globalUsersDatabase[userIn] && globalUsersDatabase[userIn].password === passIn) {
                    localStorage.setItem('health_user', userIn); localStorage.setItem('health_binId', globalUsersDatabase[userIn].binId); window.location.reload();
                } else { alert("帳號密碼錯誤"); }
            }
        });
    }

    function setupAdminConsole() {
        var box = document.getElementById('admin-user-selector-box');
        var selector = document.getElementById('admin-select-user');
        selector.innerHTML = ""; box.style.display = 'block';
        Object.keys(HARDCODED_USERS).forEach(u => selector.innerHTML += `<option value="${u}">${u} (管理員)</option>`);
        Object.keys(globalUsersDatabase).forEach(u => { if(!HARDCODED_USERS[u]) selector.innerHTML += `<option value="${u}">${u}</option>`; });
    }

    function adminSwitchUserView() {
        currentViewingUser = document.getElementById('admin-select-user').value || currentUser;
        targetUserBinId = HARDCODED_USERS[currentViewingUser] ? HARDCODED_USERS[currentViewingUser].binId : globalUsersDatabase[currentViewingUser].binId;
        document.getElementById('user-display').innerText = "目前查看：" + currentViewingUser;
        lockInterfaceForLoading(); appData = {}; initSystem();
    }

    function performLogout() { localStorage.clear(); window.location.reload(); }

    function initSystem() {
        setInterval(() => { var now = new Date(); document.getElementById('clock-display').innerText = now.toTimeString().split(' ')[0]; }, 1000);
        // ✅ 修正：使用當地時間初始化
        selectedDateStr = getLocalYYYYMMDD(new Date());
        pullDataFromCloud();
    }

    function pullDataFromCloud() {
        if (!targetUserBinId) return;
        fetch('https://api.jsonbin.io/v3/b/' + targetUserBinId + '/latest', { method: 'GET', headers: { 'X-Master-Key': MASTER_KEY } })
        .then(res => res.json()).then(data => {
            appData = data.record || {};
            isDataLoaded = true;
            document.getElementById('punch-btn-element').disabled = false;
            document.getElementById('punch-btn-element').innerText = "✨ 當日健康打卡 ✨";
            document.getElementById('save-note-btn-el').disabled = false;
            document.getElementById('note-input').disabled = false;
            document.getElementById('sync-status').innerText = "✅ 雲端同步完成";
            renderCalendar(); selectDay(selectedDateStr);
        });
    }

    function pushDataToCloud(callback) {
        if (!targetUserBinId || !isDataLoaded) return;
        document.getElementById('sync-status').innerText = "上傳雲端中...";
        fetch('https://api.jsonbin.io/v3/b/' + targetUserBinId, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify(appData) })
        .then(() => { 
            document.getElementById('sync-status').innerText = "✅ 儲存成功"; 
            if(callback) callback(); 
        });
    }

    function performPunchIn() {
        if(!isDataLoaded) return;
        // ✅ 修正：使用精準的當地時間打卡，這樣紀錄才不會存到昨天！
        var todayStr = getLocalYYYYMMDD(new Date());
        if (!appData[todayStr]) appData[todayStr] = {};
        appData[todayStr].punch = "🌟 乖寶寶 (" + new Date().toTimeString().substring(0,5) + ")";
        pushDataToCloud(() => { renderCalendar(); selectDay(todayStr); });
    }

    function renderCalendar() {
        var grid = document.getElementById('calendar-grid'); grid.innerHTML = ''; 
        var year = currentDate.getFullYear(), month = currentDate.getMonth();
        document.getElementById('calendar-month-year').innerText = year + "年 " + (month + 1) + "月";
        var totalDays = new Date(year, month + 1, 0).getDate();
        for (var i = 0; i < new Date(year, month, 1).getDay(); i++) grid.appendChild(document.createElement('div'));
        
        for (var d = 1; d <= totalDays; d++) {
            var loopDateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
            var dayDiv = document.createElement('div'); dayDiv.className = 'day';
            if (loopDateStr === selectedDateStr) dayDiv.classList.add('current-selected');
            dayDiv.innerHTML = "<div>" + d + "</div>" + (appData[loopDateStr] && appData[loopDateStr].punch ? "<div class='day-status'>" + appData[loopDateStr].punch.split(' ')[0] + "</div>" : "");
            dayDiv.onclick = (function(ds) { return function() { selectDay(ds); } })(loopDateStr);
            grid.appendChild(dayDiv);
        }
    }

    function changeMonth(direction) { currentDate.setMonth(currentDate.getMonth() + direction); renderCalendar(); }

    function selectDay(dateStr) {
        selectedDateStr = dateStr;
        document.querySelectorAll('.day').forEach(n => n.classList.remove('current-selected'));
        document.getElementById('editor-date-title').innerText = "📅 觀看/編輯 " + dateStr + " 紀錄";
        
        var historyZone = document.getElementById('day-punch-history');
        historyZone.innerText = (appData[dateStr] && appData[dateStr].punch) ? "當日打卡：" + appData[dateStr].punch : "當日無打卡紀錄";
        document.getElementById('note-input').value = (appData[dateStr] && appData[dateStr].note) ? appData[dateStr].note : "";
    }

    function saveDailyNote() {
        if(!isDataLoaded) return;
        if (!appData[selectedDateStr]) appData[selectedDateStr] = {};
        appData[selectedDateStr].note = document.getElementById('note-input').value.trim();
        pushDataToCloud(() => alert("日記儲存成功！"));
    }
</script>
</body>
</html>
