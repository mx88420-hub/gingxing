<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早睡早起身體好 - 照片常駐雲端版</title>

    <style>
        :root {
            --bg-color: #F6F8FA;
            --card-bg: #FFFFFF;
            --primary-pink: #FFB7B2;
            --primary-blue: #B5E2FA;
            --primary-green: #DDF1E7;
            --primary-purple: #E1BEE7;
            --primary-yellow: #FFDAC1;
            --text-color: #5D5D5D;
            --danger-color: #FF9AA2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(246, 248, 250, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 4px solid var(--primary-purple);
            text-align: center;
            max-width: 380px;
            width: 100%;
        }

        .login-box h3 {
            margin-top: 0;
            color: #6C7A89;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-login-submit {
            background-color: var(--primary-purple);
        }

        .btn-register-submit {
            background-color: var(--primary-blue);
            color: #5D5D5D;
        }

        .switch-mode-text {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
        }

        #login-error {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }

        .main-layout {
            display: flex;
            gap: 25px;
            max-width: 1150px;
            width: 100%;
            flex-wrap: wrap;
            display: none;
        }

        .left-panel,
        .right-panel {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            padding: 25px;
        }

        .left-panel {
            flex: 1;
            min-width: 320px;
            border: 4px solid var(--primary-pink);
            text-align: center;
        }

        .right-panel {
            flex: 1.6;
            min-width: 420px;
            border: 4px solid var(--primary-blue);
        }

        .tag-title {
            background-color: var(--primary-purple);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .clock {
            font-size: 38px;
            font-weight: bold;
            color: #4A4A4A;
            margin: 10px 0;
            background: var(--primary-green);
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
        }

        #admin-user-selector-box {
            background: #F0F4F8;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }

        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #CCC;
        }

        .btn {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-punch {
            background-color: var(--primary-pink);
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn-punch:disabled,
        .save-btn:disabled {
            background-color: #CCC !important;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .good-baby {
            background-color: #E8F5E9;
            color: #2E7D32;
        }

        .bad-baby {
            background-color: #FFEBEE;
            color: #C62828;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .day {
            background-color: #F9F9F9;
            aspect-ratio: 1;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
            font-size: 13px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .day.current-selected {
            border: 2px solid var(--primary-purple);
            background-color: #F3E5F5;
        }

        .day-status {
            font-size: 11px;
            margin-top: auto;
            font-weight: bold;
        }

        .editor-section {
            margin-top: 20px;
            background: #FDFDFD;
            border: 2px dashed #E0E0E0;
            border-radius: 15px;
            padding: 15px;
        }

        .editor-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #7A869A;
        }

        .photo-section {
            margin-bottom: 15px;
            background: #F9F9F9;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #EEE;
        }

        #photo-preview-box {
            width: 100%;
            min-height: 150px;
            border: 2px dashed #CCC;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #FFF;
            margin-top: 8px;
        }

        #food-img-element {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            display: none;
        }

        textarea {
            width: 100%;
            height: 90px;
            border: 1px solid #DDD;
            border-radius: 10px;
            padding: 10px;
            resize: none;
            margin-bottom: 10px;
        }

        .save-btn {
            background-color: var(--primary-purple);
            float: right;
            padding: 8px 20px;
            font-size: 14px;
        }

        .clear {
            clear: both;
        }

        .loading-text {
            font-size: 12px;
            color: #AAA;
            margin-top: 5px;
        }

        .user-panel-top {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            background: #FFF;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid #E0E0E0;
        }

        .btn-logout {
            background-color: #FFF;
            color: #FF9AA2;
            border: 1px solid #FF9AA2;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 800px) {
            body {
                padding: 10px;
            }

            .left-panel,
            .right-panel {
                min-width: 100%;
            }

            .right-panel {
                min-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="login-box">
            <h3 id="form-title">歡迎來到早睡早起身體好</h3>

            <div class="input-group">
                <label>帳號</label>
                <input type="text" id="username" class="login-input">
            </div>

            <div class="input-group">
                <label>密碼</label>
                <input type="password" id="password" class="login-input">
            </div>

            <div id="login-error"></div>

            <div class="btn-group">
                <button id="btn-main-submit" class="btn-action btn-login-submit" onclick="handleFormSubmit()">登入</button>
            </div>

            <div class="switch-mode-text" id="switch-mode-btn" onclick="toggleAuthMode()">還沒有帳號？免費註冊</div>
        </div>
    </div>

    <div class="main-layout" id="main-system">

        <div class="left-panel">

            <div class="user-panel-top">
                <div id="user-display">目前登入：--</div>
                <button class="btn-logout" onclick="performLogout()">🔒 登出（不刪紀錄）</button>
            </div>

            <div id="admin-user-selector-box">
                <label>👑 選擇要查看的用戶資料</label>
                <select id="admin-select-user" onchange="adminSwitchUserView()"></select>
            </div>

            <div class="tag-title">早睡早起身體好</div>

            <div class="clock" id="clock-display">00:00:00</div>

            <button id="punch-btn-element" class="btn btn-punch" disabled onclick="performPunchIn()">
                ⏳ 正在載入雲端資料...
            </button>

            <div id="sync-status" class="loading-text">正在同步雲端...</div>

            <div class="result-box" id="result-display"></div>
        </div>

        <div class="right-panel">

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <h2 id="calendar-month-year" style="margin: 0; font-size: 20px;">2026年 --月</h2>
                <button onclick="changeMonth(1)">▶</button>
            </div>

            <div class="calendar-grid" id="calendar-grid"></div>

            <div class="editor-section">

                <div class="editor-title" id="editor-date-title">選擇日期來記錄生活吧！</div>

                <div id="day-punch-history" style="font-size: 13px; color: #666; margin-bottom: 10px; font-weight: bold;"></div>

                <div class="photo-section">
                    <div style="font-weight: bold; font-size: 14px; color: #5D5D5D;">📷 記錄三餐與生活照片</div>

                    <input
                        type="file"
                        id="photo-file-input"
                        accept="image/*"
                        onchange="handleImageUpload(event)"
                        style="font-size: 12px; margin-top: 8px;"
                    >

                    <div id="photo-preview-box">
                        <div id="photo-placeholder-text" style="color: #AAA; font-size: 13px;">今日尚未上傳照片</div>
                        <img id="food-img-element" src="" alt="生活紀錄照片">
                    </div>

                    <div id="img-upload-status" class="loading-text" style="color: #B5E2FA; font-weight: bold;"></div>
                </div>

                <textarea id="note-input" placeholder="今天有什麼想分享的心情..." disabled></textarea>

                <button id="save-note-btn-el" class="btn save-btn" disabled onclick="saveDailyNote()">儲存今日心情</button>

                <div class="clear"></div>
            </div>
        </div>
    </div>

    <script>
        /*
            注意：
            這是沿用你原本的 JSONBin 架構。
            請保留你原本自己的 Bin ID、Master Key、管理員帳號資料。
        */

        var GLOBAL_REG_BIN = '6a3b7243f5f4af5e29272dc4';
        var MASTER_KEY = '$2a$10$hI.UbvJsfQa.7SxfrbZQE./.4pB/55flm6kq88Vuwgt/3IzyMB5ii';
        var ORIGINAL_BIN = '65ab19e51f5677613ba2a488';

        var HARDCODED_USERS = {
            'ginggingxing': {
                pass: '0979365961',
                isAdmin: true,
                binId: ORIGINAL_BIN
            }
        };

        var isRegisterMode = false;
        var currentUser = "";
        var targetUserBinId = "";
        var currentViewingUser = "";
        var globalUsersDatabase = {};
        var appData = {};
        var currentDate = new Date();
        var selectedDateStr = "";
        var isDataLoaded = false;
        var clockInterval = null;
        var isSaving = false;

        function getLocalDateStr(date = new Date()) {
            var year = date.getFullYear();
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var day = String(date.getDate()).padStart(2, '0');

            return year + "-" + month + "-" + day;
        }

        function showLoginError(message) {
            var errorBox = document.getElementById('login-error');
            errorBox.innerText = message;
            errorBox.style.display = 'block';
        }

        function clearLoginError() {
            var errorBox = document.getElementById('login-error');
            errorBox.innerText = "";
            errorBox.style.display = 'none';
        }

        window.onload = function () {
            var savedUser = localStorage.getItem('health_user');
            var savedBinId = localStorage.getItem('health_binId');

            if (savedUser && savedBinId) {
                currentUser = savedUser;
                currentViewingUser = savedUser;
                targetUserBinId = savedBinId;

                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-system').style.display = 'flex';

                document.getElementById('user-display').innerText = "目前登入：" + currentUser;

                lockInterfaceForLoading();

                if (HARDCODED_USERS[currentUser] && HARDCODED_USERS[currentUser].isAdmin) {
                    loadAdminDataThenInit();
                } else {
                    initSystem();
                }
            }
        };

        function lockInterfaceForLoading() {
            isDataLoaded = false;

            document.getElementById('punch-btn-element').disabled = true;
            document.getElementById('punch-btn-element').innerText = "⏳ 正在載入雲端資料...";

            document.getElementById('save-note-btn-el').disabled = true;
            document.getElementById('note-input').disabled = true;
            document.getElementById('photo-file-input').disabled = true;

            document.getElementById('sync-status').innerText = "正在同步雲端...";
        }

        function unlockInterfaceAfterLoading() {
            isDataLoaded = true;

            document.getElementById('punch-btn-element').disabled = false;
            document.getElementById('punch-btn-element').innerText = "✨ 當日健康打卡 ✨";

            document.getElementById('save-note-btn-el').disabled = false;
            document.getElementById('note-input').disabled = false;
            document.getElementById('photo-file-input').disabled = false;

            document.getElementById('sync-status').innerText = "✅ 雲端同步完成";
        }

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            clearLoginError();

            document.getElementById('form-title').innerText = isRegisterMode ? "建立新帳號" : "登入";
            document.getElementById('btn-main-submit').innerText = isRegisterMode ? "註冊" : "登入";
            document.getElementById('switch-mode-btn').innerText = isRegisterMode ? "已有帳號？返回登入" : "還沒有帳號？免費註冊";
        }

        function handleFormSubmit() {
            clearLoginError();

            var userIn = document.getElementById('username').value.trim().toLowerCase();
            var passIn = document.getElementById('password').value.trim();

            if (!userIn || !passIn) {
                showLoginError("請填寫帳號及密碼！");
                return;
            }

            if (
                !isRegisterMode &&
                HARDCODED_USERS[userIn] &&
                HARDCODED_USERS[userIn].pass === passIn
            ) {
                localStorage.setItem('health_user', userIn);
                localStorage.setItem('health_binId', HARDCODED_USERS[userIn].binId);
                window.location.reload();
                return;
            }

            fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN + '/latest', {
                method: 'GET',
                headers: {
                    'X-Master-Key': MASTER_KEY
                }
            })
            .then(function (res) {
                if (!res.ok) {
                    throw new Error("無法讀取帳號資料庫");
                }

                return res.json();
            })
            .then(function (data) {
                globalUsersDatabase = data.record || {};

                if (isRegisterMode) {
                    if (globalUsersDatabase[userIn]) {
                        showLoginError("帳號被佔用！");
                        return;
                    }

                    return fetch('https://api.jsonbin.io/v3/b', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': MASTER_KEY,
                            'X-Bin-Private': 'true'
                        },
                        body: JSON.stringify({})
                    })
                    .then(function (res) {
                        if (!res.ok) {
                            throw new Error("建立個人雲端資料庫失敗");
                        }

                        return res.json();
                    })
                    .then(function (newBin) {
                        globalUsersDatabase[userIn] = {
                            password: passIn,
                            binId: newBin.metadata.id
                        };

                        return fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Master-Key': MASTER_KEY
                            },
                            body: JSON.stringify(globalUsersDatabase)
                        });
                    })
                    .then(function (res) {
                        if (!res.ok) {
                            throw new Error("儲存新帳號失敗");
                        }

                        alert("註冊成功！請使用新帳號登入。");

                        isRegisterMode = true;
                        toggleAuthMode();

                        document.getElementById('username').value = userIn;
                        document.getElementById('password').value = "";
                    });
                }

                if (
                    globalUsersDatabase[userIn] &&
                    globalUsersDatabase[userIn].password === passIn
                ) {
                    localStorage.setItem('health_user', userIn);
                    localStorage.setItem('health_binId', globalUsersDatabase[userIn].binId);
                    window.location.reload();
                } else {
                    showLoginError("帳號或密碼錯誤");
                }
            })
            .catch(function (err) {
                console.error(err);
                showLoginError("連線失敗，請檢查網路後再試。");
            });
        }

        function loadAdminDataThenInit() {
            fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN + '/latest', {
                method: 'GET',
                headers: {
                    'X-Master-Key': MASTER_KEY
                }
            })
            .then(function (res) {
                if (!res.ok) {
                    throw new Error("無法載入使用者清單");
                }

                return res.json();
            })
            .then(function (data) {
                globalUsersDatabase = data.record || {};
                setupAdminConsole();
                adminSwitchUserView();
            })
            .catch(function (err) {
                console.error(err);
                document.getElementById('sync-status').innerText = "❌ 無法載入管理員資料";
            });
        }

        function setupAdminConsole() {
            var box = document.getElementById('admin-user-selector-box');
            var selector = document.getElementById('admin-select-user');

            selector.innerHTML = "";
            box.style.display = 'block';

            Object.keys(HARDCODED_USERS).forEach(function (user) {
                selector.innerHTML += '<option value="' + user + '">' + user + '（管理員）</option>';
            });

            Object.keys(globalUsersDatabase).forEach(function (user) {
                if (!HARDCODED_USERS[user]) {
                    selector.innerHTML += '<option value="' + user + '">' + user + '</option>';
                }
            });

            selector.value = currentViewingUser || currentUser;
        }

        function adminSwitchUserView() {
            var selector = document.getElementById('admin-select-user');

            currentViewingUser = selector.value || currentUser;

            if (HARDCODED_USERS[currentViewingUser]) {
                targetUserBinId = HARDCODED_USERS[currentViewingUser].binId;
            } else if (globalUsersDatabase[currentViewingUser]) {
                targetUserBinId = globalUsersDatabase[currentViewingUser].binId;
            } else {
                return;
            }

            appData = {};
            lockInterfaceForLoading();

            document.getElementById('user-display').innerText =
                "目前登入：" + currentUser + "｜正在查看：" + currentViewingUser;

            initSystem();
        }

        function performLogout() {
            localStorage.removeItem('health_user');
            localStorage.removeItem('health_binId');

            currentUser = "";
            currentViewingUser = "";
            targetUserBinId = "";
            appData = {};

            window.location.reload();
        }

        function initSystem() {
            if (clockInterval) {
                clearInterval(clockInterval);
            }

            function updateClock() {
                var now = new Date();
                document.getElementById('clock-display').innerText = now.toTimeString().split(' ')[0];
            }

            updateClock();
            clockInterval = setInterval(updateClock, 1000);

            selectedDateStr = getLocalDateStr();
            currentDate = new Date();

            pullDataFromCloud();
        }

        function pullDataFromCloud() {
            if (!targetUserBinId) {
                return;
            }

            document.getElementById('sync-status').innerText = "正在從雲端讀取資料...";

            fetch('https://api.jsonbin.io/v3/b/' + targetUserBinId + '/latest', {
                method: 'GET',
                headers: {
                    'X-Master-Key': MASTER_KEY
                }
            })
            .then(function (res) {
                if (!res.ok) {
                    throw new Error("讀取雲端資料失敗");
                }

                return res.json();
            })
            .then(function (data) {
                appData = data.record || {};

                unlockInterfaceAfterLoading();

                renderCalendar();
                selectDay(selectedDateStr);
            })
            .catch(function (err) {
                console.error(err);

                document.getElementById('sync-status').innerText = "❌ 雲端讀取失敗，請重新整理";

                alert("無法讀取雲端資料，請確認網路連線後重新整理頁面。");
            });
        }

        function mergeCloudData(cloudData, localData) {
            var mergedData = cloudData || {};

            Object.keys(localData).forEach(function (dateKey) {
                if (!mergedData[dateKey]) {
                    mergedData[dateKey] = {};
                }

                mergedData[dateKey] = {
                    ...mergedData[dateKey],
                    ...localData[dateKey]
                };
            });

            return mergedData;
        }

        function pushDataToCloud(callback) {
            if (!targetUserBinId || !isDataLoaded) {
                return;
            }

            if (isSaving) {
                document.getElementById('sync-status').innerText = "⏳ 資料正在儲存中...";
                return;
            }

            isSaving = true;

            document.getElementById('sync-status').innerText = "正在同步雲端資料...";

            fetch('https://api.jsonbin.io/v3/b/' + targetUserBinId + '/latest', {
                method: 'GET',
                headers: {
                    'X-Master-Key': MASTER_KEY
                }
            })
            .then(function (res) {
                if (!res.ok) {
                    throw new Error("無法取得雲端最新資料");
                }

                return res.json();
            })
            .then(function (data) {
                var cloudData = data.record || {};

                appData = mergeCloudData(cloudData, appData);

                return fetch('https://api.jsonbin.io/v3/b/' + targetUserBinId, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(appData)
                });
            })
            .then(function (res) {
                if (!res.ok) {
                    throw new Error("上傳雲端資料失敗");
                }

                isSaving = false;
                document.getElementById('sync-status').innerText = "✅ 已同步到雲端";

                if (callback) {
                    callback();
                }
            })
            .catch(function (err) {
                console.error(err);

                isSaving = false;
                document.getElementById('sync-status').innerText = "❌ 雲端同步失敗";

                alert("資料同步失敗，請確認網路後重新整理頁面再試。");
            });
        }

        function performPunchIn() {
            if (!isDataLoaded || isSaving) {
                return;
            }

            var todayStr = getLocalDateStr();

            if (!appData[todayStr]) {
                appData[todayStr] = {};
            }

            appData[todayStr].punch =
                "🌟 乖寶寶 (" + new Date().toTimeString().substring(0, 5) + ")";

            pushDataToCloud(function () {
                currentDate = new Date();
                selectedDateStr = todayStr;

                renderCalendar();
                selectDay(todayStr);
            });
        }

        function renderCalendar() {
            var grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";

            var year = currentDate.getFullYear();
            var month = currentDate.getMonth();

            document.getElementById('calendar-month-year').innerText =
                year + "年 " + (month + 1) + "月";

            var totalDays = new Date(year, month + 1, 0).getDate();
            var firstDayWeek = new Date(year, month, 1).getDay();

            for (var i = 0; i < firstDayWeek; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (var day = 1; day <= totalDays; day++) {
                var loopDateStr =
                    year + "-" +
                    String(month + 1).padStart(2, '0') + "-" +
                    String(day).padStart(2, '0');

                var dayDiv = document.createElement('div');
                dayDiv.className = 'day';

                if (loopDateStr === selectedDateStr) {
                    dayDiv.classList.add('current-selected');
                }

                var status = "";

                if (appData[loopDateStr] && appData[loopDateStr].punch) {
                    status = "<div class='day-status'>🌟</div>";
                }

                dayDiv.innerHTML = "<div>" + day + "</div>" + status;

                dayDiv.onclick = (function (dateStr) {
                    return function () {
                        selectDay(dateStr);
                        renderCalendar();
                    };
                })(loopDateStr);

                grid.appendChild(dayDiv);
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function selectDay(dateStr) {
            selectedDateStr = dateStr;

            document.querySelectorAll('.day').forEach(function (node) {
                node.classList.remove('current-selected');
            });

            document.getElementById('editor-date-title').innerText =
                "📅 觀看／編輯 " + dateStr + " 紀錄";

            var historyZone = document.getElementById('day-punch-history');

            if (appData[dateStr] && appData[dateStr].punch) {
                historyZone.innerText = "當日打卡：" + appData[dateStr].punch;
            } else {
                historyZone.innerText = "當日無打卡紀錄";
            }

            var imgEl = document.getElementById('food-img-element');
            var placeholderText = document.getElementById('photo-placeholder-text');
            var fileIn = document.getElementById('photo-file-input');

            if (fileIn) {
                fileIn.value = "";
            }

            document.getElementById('img-upload-status').innerText = "";

            if (appData[dateStr] && appData[dateStr].image) {
                imgEl.src = appData[dateStr].image;
                imgEl.style.display = 'block';
                placeholderText.style.display = 'none';
            } else {
                imgEl.src = "";
                imgEl.style.display = 'none';
                placeholderText.style.display = 'block';
            }

            document.getElementById('note-input').value =
                appData[dateStr] && appData[dateStr].note
                    ? appData[dateStr].note
                    : "";
        }

        function handleImageUpload(event) {
            if (!isDataLoaded || isSaving) {
                return;
            }

            var file = event.target.files[0];

            if (!file) {
                return;
            }

            var statusEl = document.getElementById('img-upload-status');
            statusEl.innerText = "⏳ 正在壓縮與上傳照片，請稍候...";

            var reader = new FileReader();

            reader.onload = function (eventResult) {
                var img = new Image();

                img.onload = function () {
                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');

                    var maxWidth = 500;
                    var scaleSize = Math.min(maxWidth / img.width, 1);

                    canvas.width = Math.round(img.width * scaleSize);
                    canvas.height = Math.round(img.height * scaleSize);

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    var compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

                    var imgEl = document.getElementById('food-img-element');
                    imgEl.src = compressedBase64;
                    imgEl.style.display = 'block';

                    document.getElementById('photo-placeholder-text').style.display = 'none';

                    if (!appData[selectedDateStr]) {
                        appData[selectedDateStr] = {};
                    }

                    appData[selectedDateStr].image = compressedBase64;

                    pushDataToCloud(function () {
                        statusEl.innerText = "✅ 照片已成功備份至雲端！";
                        renderCalendar();
                        selectDay(selectedDateStr);
                    });
                };

                img.onerror = function () {
                    statusEl.innerText = "❌ 圖片讀取失敗，請換一張圖片再試。";
                };

                img.src = eventResult.target.result;
            };

            reader.onerror = function () {
                statusEl.innerText = "❌ 圖片讀取失敗。";
            };

            reader.readAsDataURL(file);
        }

        function saveDailyNote() {
            if (!isDataLoaded || isSaving) {
                return;
            }

            if (!appData[selectedDateStr]) {
                appData[selectedDateStr] = {};
            }

            appData[selectedDateStr].note =
                document.getElementById('note-input').value.trim();

            pushDataToCloud(function () {
                alert("日記已同步儲存到雲端！");
                renderCalendar();
                selectDay(selectedDateStr);
            });
        }

        document.addEventListener('visibilitychange', function () {
            if (
                document.visibilityState === 'visible' &&
                currentUser &&
                targetUserBinId &&
                isDataLoaded &&
                !isSaving
            ) {
                pullDataFromCloud();
            }
        });

        window.addEventListener('focus', function () {
            if (
                currentUser &&
                targetUserBinId &&
                isDataLoaded &&
                !isSaving
            ) {
                pullDataFromCloud();
            }
        });
    </script>

</body>
</html>
