<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>早睡早起身體好 - 用戶登入版</title>
    <style>
        :root { --primary-purple: #E1BEE7; --primary-pink: #FFB7B2; }
        body { font-family: sans-serif; background: #F6F8FA; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: var(--primary-purple); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div id="login-box" class="box">
    <h3>系統登入</h3>
    <input type="text" id="user" placeholder="帳號">
    <input type="password" id="pass" placeholder="密碼">
    <button onclick="auth(false)">登入</button>
    <p style="font-size:12px; cursor:pointer; color:#888;" onclick="auth(true)">還沒有帳號？點此註冊</p>
</div>

<div id="app-box" class="box" style="display:none;">
    <h3 id="welcome-msg"></h3>
    <button onclick="punch()">✨ 打卡</button>
    <button onclick="logout()" style="margin-top:10px; background:#eee;">登出</button>
</div>

<script>
    var GAS_URL = "https://script.google.com/macros/s/AKfycbwPBDQ2yN9gRM7T9rK-ScvlUc4fWFob5IugGGvzTSFUmDQ8LLE4lXWvl4cwCpk1KGwyfg/exec";
    
    // 註冊/登入功能
    function auth(isRegister) {
        var u = document.getElementById('user').value.trim();
        var p = document.getElementById('pass').value.trim();
        if(!u || !p) return alert("請輸入帳密");

        var users = JSON.parse(localStorage.getItem('user_db') || '{}');
        
        if(isRegister) {
            if(users[u]) return alert("帳號已存在");
            users[u] = p;
            localStorage.setItem('user_db', JSON.stringify(users));
            alert("註冊成功！");
        } else {
            if(users[u] === p) {
                localStorage.setItem('current_user', u);
                showApp(u);
            } else {
                alert("帳密錯誤");
            }
        }
    }

    function showApp(u) {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('app-box').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "嗨, " + u;
    }

    function punch() {
        var u = localStorage.getItem('current_user');
        var today = new Date().toISOString().split('T')[0];
        var hour = new Date().getHours();
        var status = (hour >= 2 && hour < 17) ? "😈 壞寶寶" : "🌟 乖寶寶";
        
        // 發送給 Google Sheets
        fetch(GAS_URL, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ date: today, punch: status, user: u })
        });
        alert("已打卡：" + status);
    }

    function logout() {
        localStorage.removeItem('current_user');
        location.reload();
    }
</script>
</body>
</html>
