<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>早睡早起健康平台</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #F0F2F5; padding: 20px; }
        .page { max-width: 900px; margin: auto; display: none; }
        .auth-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; background: #6C63FF; border: none; border-radius: 8px; color: white; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="auth-page" class="auth-container">
    <h2>平台登入</h2>
    <input type="text" id="username" placeholder="帳號">
    <input type="password" id="password" placeholder="密碼">
    <button class="btn" onclick="login()">登入</button>
</div>

<div id="main-page" class="page">
    <div style="display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px;">
        <div class="panel">
            <h3>個人資料</h3>
            <p id="user-display"></p>
            <button onclick="logout()">登出</button>
        </div>
        <div class="panel">
            <h3>日記與打卡</h3>
            <button class="btn" onclick="punch()">睡覺打卡</button>
            <textarea id="note" style="width:100%; height:80px; margin-top:10px;"></textarea>
            <button class="btn" style="background:#FF8A65;" onclick="saveNote()">儲存心情</button>
        </div>
        <div class="panel">
            <h3>公告</h3>
            <div id="notice-board">請使用管理員帳號登入</div>
            <div id="admin-notice-input" style="display:none; margin-top:20px;">
                <textarea id="admin-notice" style="width:100%;"></textarea>
                <button class="btn" onclick="postNotice()">發佈公告</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 【重要】請將下方網址替換為你「部署」後得到的 /exec 網址
    var GAS_URL = "填入你的部署網址"; 

    async function login() {
        let u = document.getElementById('username').value;
        let p = document.getElementById('password').value;
        let res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", username: u, password: p })
        });
        let data = await res.text();
        if(data === "Login_Success") {
            localStorage.setItem('current_user', u);
            location.reload();
        } else { alert("帳號或密碼錯誤"); }
    }

    async function punch() {
        let u = localStorage.getItem('current_user');
        await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "punch", punch: "乖寶寶", user: u, date: new Date().toLocaleDateString() })
        });
        alert("打卡成功：乖寶寶");
    }

    async function saveNote() {
        let u = localStorage.getItem('current_user');
        let note = document.getElementById('note').value;
        await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "saveNote", note: note, user: u, date: new Date().toLocaleDateString() })
        });
        alert("心情已儲存");
    }

    function logout() { localStorage.removeItem('current_user'); location.reload(); }

    window.onload = function() {
        let u = localStorage.getItem('current_user');
        if(u) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            document.getElementById('user-display').innerText = "使用者: " + u;
            if(u === 'ging') document.getElementById('admin-notice-input').style.display = 'block';
        }
    }
</script>
</body>
</html>
