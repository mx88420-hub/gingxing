<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>早睡早起身體好 - 專業多用戶版</title>
    <style>
        /* 建議沿用你原本精美的 CSS */
        body { font-family: sans-serif; background: #F6F8FA; display: flex; justify-content: center; padding: 20px; }
        .panel { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #E1BEE7; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-panel" class="panel">
    <h3>用戶系統</h3>
    <input type="text" id="username" placeholder="帳號">
    <input type="password" id="password" placeholder="密碼">
    <button id="btn-login" onclick="login()">登入</button>
    <p id="reg-link" style="font-size:12px; text-align:center; cursor:pointer;" onclick="register()">註冊新帳號</p>
</div>

<div id="main-panel" class="panel" style="display:none;">
    <h3 id="welcome"></h3>
    <div id="admin-view" style="display:none;">
        <select id="user-select" onchange="loadUserRecord()"></select>
    </div>
    <div id="record-display"></div>
    <button onclick="performPunch()">✨ 打卡 (記錄)</button>
    <button onclick="logout()" style="margin-top:10px; background:#eee;">登出</button>
</div>

<script>
    // ⚠️ 記得把這行換成你的 Google Script URL
    var GAS_URL = "https://script.google.com/macros/s/AKfycbwPBDQ2yN9gRM7T9rK-ScvlUc4fWFob5IugGGvzTSFUmDQ8LLE4lXWvl4cwCpk1KGwyfg/exec";
    
    // 模擬用戶資料庫 (因為 GitHub 無法存真實 DB，這裡用 LocalStorage 模擬)
    function getUsers() { return JSON.parse(localStorage.getItem('users') || '{"ging": "0979365961"}'); }

    function login() {
        var u = document.getElementById('username').value;
        var p = document.getElementById('password').value;
        var users = getUsers();
        
        if (users[u] === p) {
            localStorage.setItem('current_user', u);
            initApp();
        } else { alert("帳密錯誤"); }
    }

    function register() {
        var u = document.getElementById('username').value;
        var p = document.getElementById('password').value;
        var users = getUsers();
        if(users[u]) return alert("帳號已存在");
        users[u] = p;
        localStorage.setItem('users', JSON.stringify(users));
        alert("註冊成功！請登入。");
    }

    function initApp() {
        var u = localStorage.getItem('current_user');
        document.getElementById('auth-panel').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
        document.getElementById('welcome').innerText = "用戶：" + u;

        if (u === 'ging') {
            document.getElementById('admin-view').style.display = 'block';
            populateUserList();
        }
    }

    function populateUserList() {
        var users = Object.keys(getUsers());
        var select = document.getElementById('user-select');
        users.forEach(u => select.innerHTML += `<option value="${u}">${u}</option>`);
    }

    function performPunch() {
        var u = localStorage.getItem('current_user');
        var date = new Date().toISOString().split('T')[0];
        var punch = new Date().getHours() >= 2 ? "😈 壞寶寶" : "🌟 乖寶寶";
        
        // 傳送給 Google Sheets
        fetch(GAS_URL, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ date: date, punch: punch, user: u })
        });
        alert("打卡成功：" + punch);
    }

    function logout() { localStorage.removeItem('current_user'); location.reload(); }
</script>
</body>
</html>
