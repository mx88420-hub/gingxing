<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早睡早起健康平台</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #F0F2F5; margin: 0; padding: 20px; }
        .page { max-width: 900px; margin: auto; display: none; }
        .auth-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { width: 100%; padding: 12px; background: #6C63FF; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="auth-page" class="auth-container">
    <h2>平台登入</h2>
    <input type="text" id="username" placeholder="帳號">
    <input type="password" id="password" placeholder="密碼">
    <button class="btn" onclick="login()">登入</button>
</div>

<div id="main-page" class="page">
    <div style="display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px;">
        <div class="panel">
            <h3>個人資料</h3>
            <p id="user-display"></p>
            <button onclick="logout()">登出</button>
        </div>
        <div class="panel">
            <h2 id="calendar-title">2026年 6月</h2>
            <div id="calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;"></div>
            <hr>
            <h3>日記與打卡</h3>
            <button class="btn" onclick="punch()">睡覺打卡</button>
            <textarea id="note" style="width:100%; height:80px; margin-top:10px;" placeholder="記錄今日心情..."></textarea>
            <button class="btn" style="background:#FF8A65;" onclick="saveNote()">儲存心情</button>
        </div>
        <div class="panel">
            <h3>公告</h3>
            <div id="notice-board">讀取中...</div>
            <div id="admin-notice-input" style="display:none; margin-top:20px;">
                <textarea id="admin-notice" style="width:100%;" placeholder="發佈新公告..."></textarea>
                <button class="btn" onclick="postNotice()">發佈公告</button>
            </div>
        </div>
    </div>
</div>

<script>
    var GAS_URL = "https://script.google.com/macros/s/AKfycbw-ZoFwe2WXmGHywky7pmoKnmy0uci174IoCIwhEADQS8a9ZQaBwAwXEIji05TPfsGXCQ/exec";

    function login() {
        let u = document.getElementById('username').value;
        // 這裡直接判斷帳號，保留你原本的 ging 邏輯
        if (u !== "") {
            localStorage.setItem('current_user', u);
            location.reload(); // 重新整理後會自動進入主頁面
        } else {
            alert("請輸入帳號");
        }
    }

    function logout() {
        localStorage.removeItem('current_user');
        location.reload();
    }

    function showPage(page) {
        document.getElementById('auth-page').style.display = (page === 'auth') ? 'block' : 'none';
        document.getElementById('main-page').style.display = (page === 'main') ? 'block' : 'none';
    }

    window.onload = function() {
        let u = localStorage.getItem('current_user');
        if(u) {
            showPage('main');
            document.getElementById('user-display').innerText = "使用者: " + u;
            
            // 關鍵：如果登入的是管理員，才顯示公告輸入框
            if(u === 'ging') {
                document.getElementById('admin-notice-input').style.display = 'block';
            }
        } else {
            showPage('auth');
        }
        
        // 渲染日曆
        let grid = document.getElementById('calendar-grid');
        for(let i=1; i<=30; i++) {
            let div = document.createElement('div');
            div.style.border = "1px solid #eee"; div.style.aspectRatio = "1";
            div.innerText = i; grid.appendChild(div);
        }
    }
    
    // (保留原本的 saveNote, punch, postNotice 函數...)
</script>
</body>
</html>
