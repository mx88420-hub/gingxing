<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早睡早起身體好 - Google Sheets 雲端版</title>
    <style>
        :root {
            --bg-color: #F6F8FA; --card-bg: #FFFFFF;
            --primary-pink: #FFB7B2; --primary-blue: #B5E2FA; 
            --primary-green: #DDF1E7; --primary-purple: #E1BEE7; 
            --text-color: #5D5D5D;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .main-layout { display: flex; gap: 25px; max-width: 900px; width: 100%; flex-wrap: wrap; }
        .panel { background: var(--card-bg); border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); flex: 1; min-width: 300px; }
        .btn { border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; color: white; width: 100%; margin-top: 10px; }
        .btn-punch { background-color: var(--primary-pink); }
        .save-btn { background-color: var(--primary-purple); }
        textarea { width: 100%; height: 100px; border: 1px solid #DDD; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        .clock { font-size: 30px; font-weight: bold; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="panel">
        <h3>早睡早起身體好</h3>
        <div class="clock" id="clock-display">00:00:00</div>
        <button class="btn btn-punch" onclick="performPunchIn()">✨ 打卡 (記錄到雲端)</button>
        <div id="sync-status" style="font-size: 12px; color: #888; text-align: center; margin-top: 10px;">就緒</div>
    </div>
    <div class="panel">
        <h3 id="date-title">選擇日期</h3>
        <textarea id="note-input" placeholder="今天的心情..."></textarea>
        <button class="btn save-btn" onclick="saveNote()">儲存心情</button>
    </div>
</div>

<script>
    // 你的 Google Apps Script 網址
    var GAS_URL = "https://script.google.com/macros/s/AKfycbwPBDQ2yN9gRM7T9rK-ScvlUc4fWFob5IugGGvzTSFUmDQ8LLE4lXWvl4cwCpk1KGwyfg/exec";
    var currentUser = "user1"; // 你可以改成動態獲取
    var appData = JSON.parse(localStorage.getItem('my_health_data')) || {};

    // 啟動時鐘
    setInterval(() => { document.getElementById('clock-display').innerText = new Date().toLocaleTimeString(); }, 1000);

    function getLocalYYYYMMDD(d) {
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // 發送資料給 Google Sheets
    function sendToGoogle(payload) {
        document.getElementById('sync-status').innerText = "同步中...";
        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(() => {
            document.getElementById('sync-status').innerText = "✅ Google Sheets 同步完成";
        }).catch(() => {
            document.getElementById('sync-status').innerText = "⚠️ 離線模式 (資料僅存於本地)";
        });
    }

    function performPunchIn() {
        var today = getLocalYYYYMMDD(new Date());
        var time = new Date().toTimeString().substring(0,5);
        var hour = new Date().getHours();
        var status = (hour >= 2 && hour < 17) ? "😈 壞寶寶" : "🌟 乖寶寶";
        
        appData[today] = { punch: status + " (" + time + ")", note: appData[today]?.note || "" };
        localStorage.setItem('my_health_data', JSON.stringify(appData));
        
        sendToGoogle({ date: today, punch: appData[today].punch, note: appData[today].note, user: currentUser });
        alert("打卡完成！");
    }

    function saveNote() {
        var today = getLocalYYYYMMDD(new Date());
        var note = document.getElementById('note-input').value;
        if (!appData[today]) appData[today] = { punch: "無" };
        appData[today].note = note;
        localStorage.setItem('my_health_data', JSON.stringify(appData));
        
        sendToGoogle({ date: today, punch: appData[today].punch, note: note, user: currentUser });
        alert("心情已儲存！");
    }
</script>
</body>
</html>
