<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早睡早起健康平台</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #F0F2F5; margin: 0; padding: 20px; }
        .page { max-width: 900px; margin: auto; display: none; } /* 預設隱藏主頁 */
        .auth-container { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #6C63FF; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-page" class="auth-container">
    <h1>早睡早起平台</h1>
    <div class="input-group">
        <label>帳號</label>
        <input type="text" id="username" placeholder="請輸入帳號">
    </div>
    <div class="input-group">
        <label>密碼</label>
        <input type="password" id="password" placeholder="請輸入密碼">
    </div>
    <button class="btn" onclick="login()">登入 / 註冊</button>
</div>

<div id="main-page" class="page">
    <div style="display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px;">
        <div class="panel">
            <h3>個人資料</h3>
            <p id="user-display"></p>
            <button onclick="logout()">登出</button>
        </div>
        <div class="panel">
            <h2 id="calendar-title"></h2>
            <div id="calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px;"></div>
            <hr>
            <h3>日記與打卡</h3>
            <button class="btn" onclick="punch()">睡覺打卡</button>
            <textarea id="note" style="width:100%; height:80px; margin-top:10px;" placeholder="記錄今日心情..."></textarea>
            <button class="btn" style="background:#FF8A65;" onclick="saveNote()">儲存心情</button>
        </div>
        <div class="panel">
            <h3>公告</h3>
            <div id="notice-board">讀取中...</div>
        </div>
    </div>
</div>

<script>
    var GAS_URL = "https://script.google.com/macros/s/AKfycbw-ZoFwe2WXmGHywky7pmoKnmy0uci174IoCIwhEADQS8a9ZQaBwAwXEIji05TPfsGXCQ/exec";

    function login() {
        let u = document.getElementById('username').value;
        let p = document.getElementById('password').value;
        // 實際開發中，這裡應該透過 GET 請求去驗證帳密是否存在
        // 這裡暫時模擬登入成功並跳轉
        localStorage.setItem('current_user', u);
        showPage('main');
    }

    function showPage(page) {
        document.getElementById('auth-page').style.display = (page === 'auth') ? 'block' : 'none';
        document.getElementById('main-page').style.display = (page === 'main') ? 'block' : 'none';
    }

    function logout() {
        localStorage.removeItem('current_user');
        location.reload();
    }

    window.onload = function() {
        let u = localStorage.getItem('current_user');
        if(u) {
            showPage('main');
            document.getElementById('user-display').innerText = "使用者: " + u;
            // 這裡可以呼叫 renderCalendar() 等功能
        } else {
            showPage('auth');
        }
    }
</script>
</body>
</html>
