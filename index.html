<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早睡早起身體好 - 雲端多用戶照片版</title>
    <style>
        :root {
            --bg-color: #F6F8FA;
            --card-bg: #FFFFFF;
            --primary-pink: #FFB7B2; 
            --primary-blue: #B5E2FA; 
            --primary-green: #DDF1E7; 
            --primary-purple: #E1BEE7; 
            --primary-yellow: #FFDAC1; 
            --text-color: #5D5D5D;
            --danger-color: #FF9AA2;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 🔒 登入/註冊 遮罩畫面 */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(246, 248, 250, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 4px solid var(--primary-purple);
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-sizing: border-box;
        }

        .login-box h3 {
            margin-top: 0;
            color: #6C7A89;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-input:focus { outline: none; border-color: var(--primary-purple); }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn-action:disabled { cursor: not-allowed; opacity: 0.7; }
        .btn-login-submit { background-color: var(--primary-purple); box-shadow: 0 5px 15px rgba(225, 190, 231, 0.5); }
        .btn-register-submit { background-color: var(--primary-blue); color: #5D5D5D; }

        .switch-mode-text {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
        }

        #login-error {
            color: var(--danger-color);
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
            background: #FFEBEE;
            padding: 10px;
            border-radius: 8px;
        }

        /* 主畫面布局 */
        .main-layout {
            display: flex;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
            flex-wrap: wrap;
            display: none;
        }

        .left-panel, .right-panel {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            padding: 25px;
            box-sizing: border-box;
        }

        .left-panel {
            flex: 1;
            min-width: 320px;
            border: 4px solid var(--primary-pink);
            text-align: center;
        }

        .right-panel {
            flex: 1.5;
            min-width: 400px;
            border: 4px solid var(--primary-blue);
        }

        .tag-title {
            background-color: var(--primary-purple);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .clock {
            font-size: 38px;
            font-weight: bold;
            color: #4A4A4A;
            margin: 10px 0;
            background: var(--primary-green);
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
        }

        .slogan-box {
            background-color: #FFF4E5;
            border-left: 5px solid var(--primary-yellow);
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            color: #8A6D3B;
            text-align: left;
            line-height: 1.4;
        }

        /* 👑 管理員專用選單 */
        #admin-user-selector-box {
            background: #F0F4F8;
            border: 2px dashed #B0C4DE;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
            display: none;
        }
        #admin-user-selector-box label { font-size: 12px; font-weight: bold; color: #4682B4; }
        select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 8px; border: 1px solid #CCC; }

        .btn {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-punch { background-color: var(--primary-pink); width: 100%; padding: 15px; font-size: 18px; box-shadow: 0 5px 15px rgba(255, 183, 178, 0.4); margin-bottom: 10px; }
        .btn-sync { background-color: var(--primary-blue); color: #5D5D5D; font-size: 13px; padding: 5px 15px; border-radius: 10px; margin-bottom: 15px; display: inline-block; }
        .btn:hover { transform: translateY(-2px); }

        .result-box { margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 18px; font-weight: bold; display: none; }
        .good-baby { background-color: #E8F5E9; color: #2E7D32; border: 2px dashed #A5D6A7; }
        .bad-baby { background-color: #FFEBEE; color: #C62828; border: 2px dashed #EF9A9A; }

        /* 📋 右側歷史打卡紀錄面板 */
        .history-list-box {
            margin-top: 20px;
            background-color: #F8F9FA;
            border: 2px dashed #CED4DA;
            border-radius: 16px;
            padding: 15px;
            text-align: left;
        }
        .history-list-title {
            font-size: 15px;
            font-weight: bold;
            color: #4A4A4A;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--primary-blue);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .history-items-container {
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
        }
        .history-item {
            padding: 8px;
            border-bottom: 1px dashed #E0E0E0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:last-child { border-bottom: none; }

        /* 行事曆 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-btn { background: var(--primary-blue); border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #5D5D5D; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .weekday { font-weight: bold; color: #A0A0A0; font-size: 13px; padding: 5px 0; }
        .day { background-color: #F9F9F9; aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; justify-content: space-between; padding: 4px; font-size: 13px; cursor: pointer; border: 2px solid transparent; }
        .day:hover { background-color: #E3F2FD; }
        .day.current-selected { border: 2px solid var(--primary-purple); background-color: #F3E5F5; }
        .day.today { background-color: var(--primary-blue); font-weight: bold; }
        .day-status { font-size: 12px; margin-top: auto; font-weight: bold; }

        /* 📸 照片與日記編輯區 */
        .editor-section { margin-top: 20px; background: #FDFDFD; border: 2px dashed #E0E0E0; border-radius: 15px; padding: 15px; }
        .editor-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #7A869A; }
        
        .food-photo-container {
            width: 100%;
            max-height: 220px;
            background-color: #F0F0F0;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            border: 2px dashed #CCC;
            position: relative;
        }
        .food-photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .photo-placeholder-text { color: #999; font-size: 13px; text-align: center; padding: 20px; }
        .upload-hidden-input { display: none; }
        .btn-upload-trigger {
            background-color: #FFF;
            color: #6C7A89;
            border: 2px solid #CCC;
            padding: 6px 15px;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 12px;
            display: inline-block;
            font-weight: bold;
        }
        .btn-upload-trigger:hover { background-color: #F5F5F5; }

        textarea { width: 100%; height: 70px; border: 1px solid #DDD; border-radius: 10px; padding: 10px; box-sizing: border-box; resize: none; font-family: inherit; margin-bottom: 10px; }
        .save-btn { background-color: var(--primary-purple); padding: 8px 20px; font-size: 14px; float: right; }
        .clear { clear: both; }
        .loading-text { font-size: 12px; color: #aaa; margin-top: 5px; }
        
        .user-panel-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; }
        .user-badge { color: #888; font-weight: bold; }
        .btn-logout { background-color: #FFF; color: #FF9AA2; border: 1.5px solid #FF9AA2; padding: 4px 10px; font-size: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-logout:hover { background-color: #FF9AA2; color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="tag-title" style="font-size: 14px; margin-bottom: 10px;" id="form-tag">🔐 安全登入系統</div>
        <h3 id="form-title">歡迎來到早睡早起身體好</h3>
        
        <div class="input-group">
            <label>使用者帳號 (僅支援英數字)</label>
            <input type="text" id="username" class="login-input" placeholder="請輸入帳號" onkeypress="handleKeyPress(event)">
        </div>
        <div class="input-group">
            <label>登入密碼</label>
            <input type="password" id="password" class="login-input" placeholder="請輸入密碼" onkeypress="handleKeyPress(event)">
        </div>
        
        <div id="login-error"></div>

        <div class="btn-group">
            <button id="btn-main-submit" class="btn-action btn-login-submit" onclick="handleFormSubmit()">登入</button>
        </div>
        <div class="switch-mode-text" id="switch-mode-btn" onclick="toggleAuthMode()">還沒有帳號？點此免費註冊</div>
    </div>
</div>

<div class="main-layout" id="main-system">
    <div class="left-panel">
        <div class="user-panel-top">
            <div class="user-badge" id="user-display">目前登入：--</div>
            <button class="btn-logout" onclick="performLogout()">🔒 安全登出</button>
        </div>
        
        <div id="admin-user-selector-box">
            <label>👑 管理員專用：請選擇要查看的用戶資料</label>
            <select id="admin-select-user" onchange="adminSwitchUserView(false)"></select>
        </div>

        <div class="tag-title">早睡早起身體好</div>
        <div>
            <button class="btn btn-sync" onclick="pullDataFromCloud()">🔄 點擊刷新同步雲端</button>
            <div id="sync-status" class="loading-text">正在同步雲端...</div>
        </div>
        <div id="live-date" style="font-size: 16px; color: #888;">2026年--月--日</div>
        <div class="clock" id="clock-display">00:00:00</div>
        
        <div class="slogan-box" id="slogan-display">加油！每天都是全新、更棒的自己！</div>
        
        <button id="punch-btn-element" class="btn btn-punch" onclick="performPunchIn()">✨ 當日健康打卡 ✨</button>
        <div class="result-box" id="result-display"></div>
    </div>
    
    <div class="right-panel">
        <div class="calendar-header">
            <button class="calendar-btn" onclick="changeMonth(-1)">◀</button>
            <h2 id="calendar-month-year" style="margin:0; font-size:20px;">2026年 --月</h2>
            <button class="calendar-btn" onclick="changeMonth(1)">▶</button>
        </div>
        
        <div class="calendar-grid" id="calendar-grid"></div>

        <div class="history-list-box">
            <div class="history-list-title">
                <span>📋 歷史打卡時間紀錄面板</span>
                <span id="history-user-badge" style="font-size:12px; color:#007BFF; font-weight:bold;"></span>
            </div>
            <div class="history-items-container" id="history-items-list">
                <div style="color:#aaa; text-align:center; padding-top:20px;">尚無歷史打卡資料</div>
            </div>
        </div>

        <div class="editor-section">
            <div class="editor-title" id="editor-date-title">選擇日期來記錄生活吧！</div>
            <div id="day-punch-history" style="font-size: 13px; color: #666; margin-bottom: 8px; font-weight: bold;"></div>
            
            <div class="food-photo-container" id="photo-preview-box">
                <div class="photo-placeholder-text" id="photo-placeholder-text">📸 今天吃了什麼好料？點下方按鈕上傳照片分享吧！</div>
                <img id="food-img-element" style="display:none;" src="" alt="今日美食">
            </div>
            
            <input type="file" id="photo-file-input" class="upload-hidden-input" accept="image/*" onchange="processAndPreviewImage(this)">
            <button id="upload-btn-trigger-el" class="btn-upload-trigger" onclick="document.getElementById('photo-file-input').click()">📷 上傳/更換今天吃什麼的照片</button>

            <textarea id="note-input" placeholder="今天有什麼想分享的心情..."></textarea>
            <button id="save-note-btn-el" class="btn save-btn" onclick="saveDailyNote()">儲存今日美食與心情</button>
            <div class="clear"></div>
        </div>
    </div>
</div>

<script>
    var GLOBAL_REG_BIN = '6a3b7243f5f4af5e29272dc4'; 
    var MASTER_KEY = '$2a$10$hI.UbvJsfQa.7SxfrbZQE./.4pB/55flm6kq88Vuwgt/3IzyMB5ii';
    var ORIGINAL_BIN = '65ab19e51f5677613ba2a488'; 

    var HARDCODED_USERS = {
        'ginggingxing': { pass: '0979365961', isAdmin: true, binId: ORIGINAL_BIN },
        'popoman': { pass: '0926682683', isAdmin: false, binId: ORIGINAL_BIN }
    };
    var isRegisterMode = false;
    var currentUser = "";
    var targetUserBinId = ""; 
    var currentViewingUser = ""; 
    var globalUsersDatabase = {};
    var appData = {}; 
    var currentDate = new Date(); 
    var selectedDateStr = ""; 
    var syncIntervalId = null;
    var base64ImageStr = ""; 

    window.onload = function() {
        var savedUser = localStorage.getItem('health_user');
        var savedBinId = localStorage.getItem('health_binId');
        var savedViewingUser = localStorage.getItem('health_viewUser');
        
        if (savedUser && savedBinId) {
            currentUser = savedUser;
            targetUserBinId = savedBinId;
            currentViewingUser = savedViewingUser || savedUser;
            
            // 預先加載快取防止空白
            var cachedData = localStorage.getItem('health_cached_data_' + currentViewingUser);
            if(cachedData) { appData = JSON.parse(cachedData); }

            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            
            if(HARDCODED_USERS[currentUser] && HARDCODED_USERS[currentUser].isAdmin) {
                document.getElementById('user-display').innerText = "👑 管理員：" + currentUser;
                fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN + '/latest', {
                    method: 'GET', headers: { 'X-Master-Key': MASTER_KEY }
                }).then(function(r){ return r.json(); }).then(function(d){ 
                    globalUsersDatabase = d.record || {};
                    setupAdminConsole();
                    document.getElementById('admin-select-user').value = currentViewingUser;
                    adminSwitchUserView(true); 
                }).catch(function(e){ console.log(e); });
            } else {
                document.getElementById('user-display').innerText = "👤 使用者：" + currentUser;
                document.getElementById('admin-user-selector-box').style.display = 'none';
            }
            initSystem();
        }
    };

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        var tag = document.getElementById('form-tag');
        var title = document.getElementById('form-title');
        var btn = document.getElementById('btn-main-submit');
        var switchBtn = document.getElementById('switch-mode-btn');
        document.getElementById('login-error').style.display = 'none';
        if(isRegisterMode) {
            tag.innerText = "📝 新增用戶註冊";
            title.innerText = "建立全新專屬個人日記箱";
            btn.innerText = "確認註冊新帳號";
            btn.className = "btn-action btn-register-submit";
            switchBtn.innerText = "已有帳號？返回登入畫面";
        } else {
            tag.innerText = "🔐 安全登入系統";
            title.innerText = "歡迎來到早睡早起身體好";
            btn.innerText = "登入";
            btn.className = "btn-action btn-login-submit";
            switchBtn.innerText = "還沒有帳號？點此免費註冊";
        }
    }

    function handleKeyPress(e) { if (e.key === 'Enter' || e.keyCode === 13) handleFormSubmit(); }
    function showError(msg) { var errorMsg = document.getElementById('login-error'); if(errorMsg) { errorMsg.innerText = msg; errorMsg.style.display = 'block'; } }

    function handleFormSubmit() {
        var userIn = document.getElementById('username').value.trim().toLowerCase();
        var passIn = document.getElementById('password').value.trim();
        var errorMsg = document.getElementById('login-error');
        var submitBtn = document.getElementById('btn-main-submit');
        
        errorMsg.style.display = 'none';
        if(!userIn || !passIn) { showError("❌ 請填寫帳號及密碼！"); return; }

        submitBtn.disabled = true;

        if(!isRegisterMode && HARDCODED_USERS[userIn]) {
            if(HARDCODED_USERS[userIn].pass === passIn) {
                currentUser = userIn; currentViewingUser = userIn; targetUserBinId = HARDCODED_USERS[userIn].binId;
                localStorage.setItem('health_user', currentUser);
                localStorage.setItem('health_binId', targetUserBinId);
                localStorage.setItem('health_viewUser', currentViewingUser);

                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-system').style.display = 'flex';
                if(HARDCODED_USERS[userIn].isAdmin) {
                    document.getElementById('user-display').innerText = "👑 管理員：" + currentUser;
                    setupAdminConsole(); 
                } else {
                    document.getElementById('user-display').innerText = "👤 使用者：" + currentUser;
                    document.getElementById('admin-user-selector-box').style.display = 'none';
                }
                initSystem();
                submitBtn.disabled = false;
                return;
            } else { showError("❌ 密碼不正確！"); submitBtn.disabled = false; return; }
        }

        fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN + '/latest', { method: 'GET', headers: { 'X-Master-Key': MASTER_KEY } })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            globalUsersDatabase = data.record || {};
            if(isRegisterMode) {
                if(globalUsersDatabase[userIn] || HARDCODED_USERS[userIn]) { showError("❌ 帳號已被佔用！"); submitBtn.disabled = false; return; }
                fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY, 'X-Bin-Private': 'true' },
                    body: JSON.stringify({ greeting: "Welcome!" })
                })
                .then(function(r) { return r.json(); })
                .then(function(newBin) {
                    globalUsersDatabase[userIn] = { password: passIn, binId: newBin.metadata.id };
                    return fetch('https://api.jsonbin.io/v3/b/' + GLOBAL_REG_BIN, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                        body: JSON.stringify(globalUsersDatabase)
                    });
                })
                .then(function() { alert("🎉 註冊成功！"); toggleAuthMode(); submitBtn.disabled = false; });
            } else {
                if(globalUsersDatabase[userIn] && globalUsersDatabase[userIn].password === passIn) {
                    currentUser = userIn; currentViewingUser = userIn; targetUserBinId = globalUsersDatabase[userIn].binId;
                    localStorage.setItem('health_user', currentUser);
                    localStorage.setItem('health_binId', targetUserBinId);
                    localStorage.setItem('health_viewUser', currentViewingUser);
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-system').style.display = 'flex';
                    initSystem();
                } else { showError("❌ 帳號或密碼錯誤！"); }
                submitBtn.disabled = false;
            }
        }).catch(function() { submitBtn.disabled = false; });
    }

    function setupAdminConsole() {
        var box = document.getElementById('admin-user-selector-box');
        var selector = document.getElementById('admin-select-user');
        if(!selector || !box) return;
        selector.innerHTML = ""; box.style.display = 'block';
        Object.keys(HARDCODED_USERS).forEach(function(u) {
            var opt = document.createElement('option'); opt.value = u; opt.innerText = "固定帳號：" + u; selector.appendChild(opt);
        });
        Object.keys(globalUsersDatabase).forEach(function(u) {
            var opt = document.createElement('option'); opt.value = u; opt.innerText = "註冊帳號：" + u; selector.appendChild(opt);
        });
    }

    function adminSwitchUserView(isInit) {
        var selectedUser = document.getElementById('admin-select-user').value;
        currentViewingUser = selectedUser;
        localStorage.setItem('health_viewUser', currentViewingUser);
        
        if(HARDCODED_USERS[selectedUser]) { targetUserBinId = HARDCODED_USERS[selectedUser].binId; }
        else { targetUserBinId = globalUsersDatabase[selectedUser].binId; }
        
        if(currentViewingUser !== currentUser) {
            document.getElementById('punch-btn-element').style.display = 'none';
            document.getElementById('upload-btn-trigger-el').style.display = 'none';
            document.getElementById('save-note-btn-el').style.display = 'none';
            document.getElementById('note-input').readOnly = true;
        } else {
            document.getElementById('punch-btn-element').style.display = 'block';
            document.getElementById('upload-btn-trigger-el').style.display = 'inline-block';
            document.getElementById('save-note-btn-el').style.display = 'block';
            document.getElementById('note-input').readOnly = false;
        }

        var cachedData = localStorage.getItem('health_cached_data_' + currentViewingUser);
        appData = cachedData ? JSON.parse(cachedData) : {};

        renderCalendar();
        renderRightHistoryList();
        if(!isInit) { pullDataFromCloud(); }
    }

    function performLogout() {
        localStorage.clear(); if (syncIntervalId) clearInterval(syncIntervalId);
        window.location.reload();
    }

    function initSystem() {
        if(window.clockIntervalId) clearInterval(window.clockIntervalId);
        updateClock();
        window.clockIntervalId = setInterval(updateClock, 1000);
        selectedDateStr = formatDateKey(new Date());
        
        renderCalendar();
        renderRightHistoryList();
        pullDataFromCloud();
        
        if (syncIntervalId) clearInterval(syncIntervalId);
        syncIntervalId = setInterval(pullDataFromCloud, 30000);
    }

    function formatDateKey(date) {
        var y = date.getFullYear();
        var m = String(date.getMonth() + 1).padStart(2, '0');
        var d = String(date.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + d;
    }

    function updateClock() {
        var now = new Date();
        document.getElementById('live-date').innerText = now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日";
        document.getElementById('clock-display').innerText = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0') + ":" + String(now.getSeconds()).padStart(2, '0');
    }

    function pullDataFromCloud() {
        if (!targetUserBinId) return;
        document.getElementById('sync-status').innerText = "⏳ 正在同步 [" + currentViewingUser + "] 的雲端盒...";
        fetch('https://api.jsonbin.io/v3/b/' + targetUserBinId + '/latest', { method: 'GET', headers: { 'X-Master-Key': MASTER_KEY } })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            appData = data.record || {};
            localStorage.setItem('health_cached_data_' + currentViewingUser, JSON.stringify(appData));
            
            renderCalendar();
            renderRightHistoryList();
            
            // 安全觸發當日詳細檢視，避免 input.value 未渲染噴錯
            try { selectDay(selectedDateStr); } catch(e){}
            document.getElementById('sync-status').innerText = "✅ [" + currentViewingUser + "] 資料同步完成";
        })
        .catch(function() { document.getElementById('sync-status').innerText = "❌ 雲端同步異常"; });
    }

    function pushDataToCloud() {
        if (!targetUserBinId) return;
        localStorage.setItem('health_cached_data_' + currentViewingUser, JSON.stringify(appData));
        fetch('https://api.jsonbin.io/v3/b/' + targetUserBinId, {
            method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
            body: JSON.stringify(appData)
        }).catch(function(e){ console.log(e); });
    }

    /* 📋 渲染右側歷史打卡紀錄 */
    function renderRightHistoryList() {
        var container = document.getElementById('history-items-list');
        var badge = document.getElementById('history-user-badge');
        if(!container) return;
        
        badge.innerText = "帳號: " + currentViewingUser;
        container.innerHTML = "";

        var dates = Object.keys(appData).filter(function(k) {
            return k.match(/^\d{4}-\d{2}-\d{2}$/) && appData[k].punch;
        }).sort().reverse();

        if(dates.length === 0) {
            container.innerHTML = '<div style="color:#aaa; text-align:center; padding-top:20px;">該帳號尚無歷史打卡資料</div>';
            return;
        }

        dates.forEach(function(dStr) {
            var punchVal = appData[dStr].punch;
            var isGood = punchVal.indexOf("乖") > -1;
            var color = isGood ? "#2E7D32" : "#C62828";
            var div = document.createElement('div');
            div.className = "history-item";
            div.innerHTML = "<b style='color:#5A5A5A;'>" + dStr + "</b>" +
                            "<span style='color:" + color + "; font-weight:bold;'>" + punchVal + "</span>";
            container.appendChild(div);
        });
    }

    function performPunchIn() {
        var now = new Date();
        var todayStr = formatDateKey(now);
        var hour = String(now.getHours()).padStart(2, '0');
        var minute = String(now.getMinutes()).padStart(2, '0');
        var currentHour = now.getHours();
        
        var symbol = (currentHour >= 2 && currentHour < 12) ? "👹 壞寶寶" : "🌟 乖寶寶";
        var statusClass = (currentHour >= 2 && currentHour < 12) ? "bad-baby" : "good-baby";
        var txt = "你在 " + hour + ":" + minute + " 打卡成功！";

        var resultBox = document.getElementById('result-display');
        if(resultBox) {
            resultBox.className = "result-box " + statusClass;
            resultBox.innerHTML = "<div>" + symbol + "</div><div style='font-size:13px; font-weight:normal; margin-top:4px;'>" + txt + "</div>";
            resultBox.style.display = 'block';
        }

        if (!appData[todayStr]) appData[todayStr] = {};
        appData[todayStr].punch = symbol + " (" + hour + ":" + minute + ")";
        
        pushDataToCloud(); 
        renderCalendar();
        renderRightHistoryList();
        try { selectDay(todayStr); } catch(e){}
    }

    function renderCalendar() {
        var grid = document.getElementById('calendar-grid');
        var title = document.getElementById('calendar-month-year');
        if(!grid || !title) return;
        grid.innerHTML = ''; 
        
        var year = currentDate.getFullYear(); var month = currentDate.getMonth();
        title.innerText = year + "年 " + (month + 1) + "月";
        
        var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        weekdays.forEach(function(w) { var div = document.createElement('div'); div.className = 'weekday'; div.innerText = w; grid.appendChild(div); });
        
        var firstDay = new Date(year, month, 1).getDay();
        var totalDays = new Date(year, month + 1, 0).getDate();
        for (var i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        
        var todayStr = formatDateKey(new Date());
        for (var d = 1; d <= totalDays; d++) {
            var dayDiv = document.createElement('div'); dayDiv.className = 'day';
            var loopDate = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
            
            if (loopDate === todayStr) dayDiv.classList.add('today');
            if (loopDate === selectedDateStr) dayDiv.classList.add('current-selected');
            
            dayDiv.innerHTML = "<div>" + d + "</div>";
            
            if (appData[loopDate]) {
                var stamps = "";
                if (appData[loopDate].punch) stamps += appData[loopDate].punch.split(' ')[0];
                if (appData[loopDate].image) stamps += " 🍳";
                if(stamps !== "") {
                    var sDiv = document.createElement('div'); sDiv.className = 'day-status'; sDiv.innerText = stamps;
                    dayDiv.appendChild(sDiv);
                }
            }
            
            (function(ds) { dayDiv.onclick = function() { selectDay(ds); }; })(loopDate);
            grid.appendChild(dayDiv);
        }
    }

    function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }

    function selectDay(dateStr) {
        selectedDateStr = dateStr;
        document.querySelectorAll('.day').forEach(function(n) { n.classList.remove('current-selected'); });
        var parts = dateStr.split('-');
        var titleEl = document.getElementById('editor-date-title');
        if(titleEl) titleEl.innerText = "📅 觀看/編輯 " + parseInt(parts[1], 10) + "月" + parseInt(parts[2], 10) + "日 的日常紀錄";
        
        var hz = document.getElementById('day-punch-history');
        if(hz) {
            if (appData[dateStr] && appData[dateStr].punch) {
                hz.innerText = "當日打卡：" + appData[dateStr].punch;
                hz.style.color = appData[dateStr].punch.indexOf("乖") > -1 ? "#2E7D32" : "#C62828";
            } else { hz.innerText = "當日無打卡紀錄"; hz.style.color = "#666"; }
        }
        
        var imgEl = document.getElementById('food-img-element');
        var ph = document.getElementById('photo-placeholder-text');
        if(imgEl && ph) {
            if (appData[dateStr] && appData[dateStr].image) {
                base64ImageStr = appData[dateStr].image; imgEl.src = base64ImageStr; imgEl.style.display = 'block'; ph.style.display = 'none';
            } else { base64ImageStr = ""; imgEl.src = ""; imgEl.style.display = 'none'; ph.style.display = 'block'; }
        }
        var noteIn = document.getElementById('note-input');
        if(noteIn) noteIn.value = (appData[dateStr] && appData[dateStr].note) ? appData[dateStr].note : "";
        
        // 安全清空 file input，避免未選取物件噴錯
        var fileIn = document.getElementById('photo-file-input');
        if(fileIn) { try { fileIn.value = ""; } catch(e){} }
    }

    function processAndPreviewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function (e) {
                var img = new Image(); img.src = e.target.result;
                img.onload = function () {
                    var canvas = document.createElement('canvas');
                    var max_size = 400; var width = img.width; var height = img.height;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvas.width = width; canvas.height = height;
                    var ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    base64ImageStr = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('photo-placeholder-text').style.display = 'none';
                    var imgEl = document.getElementById('food-img-element'); imgEl.src = base64ImageStr; imgEl.style.display = 'block';
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveDailyNote() {
        var text = document.getElementById('note-input').value.trim();
        if (!appData[selectedDateStr]) appData[selectedDateStr] = {};
        appData[selectedDateStr].note = text;
        appData[selectedDateStr].image = base64ImageStr; 
        pushDataToCloud(); renderCalendar(); alert("今日美食與心情日記儲存成功囉！🌸");
    }
</script>
</body>
